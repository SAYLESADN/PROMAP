// в”Ђв”Ђ Shared PDF constants & helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
// Palette вЂ” all light/warm
var PW=210,PH=297,PML=16,PMR=16,PUW=178;
var SC={action:[201,132,122],decision:[184,92,82],terminal:[143,168,154],system:[122,96,104]};
// Text colours
var TX={dark:[61,43,53],body:[90,64,72],muted:[176,154,149],rose:[201,132,122],white:[255,255,255]};
// Background fills
var BG={cream:[250,246,242],blush:[249,240,238],card:[253,250,248],page:[255,255,255]};

function pdfNew(orient){return new window.jspdf.jsPDF({orientation:orient||'portrait',unit:'mm',format:'a4'})}
function pf(d,sz,bold,col){d.setFontSize(sz);d.setFont('helvetica',bold?'bold':'normal');d.setTextColor(col[0],col[1],col[2])}
function pSafe(y,need,d){if(y+need>PH-18){d.addPage('a4','p');return 20}return y}
function pLine(d,y){d.setDrawColor(237,224,216);d.setLineWidth(.25);d.line(PML,y,PML+PUW,y)}

// в”Ђв”Ђ Footer (every page) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function pFooter(d,title){
  var tp=d.internal.getNumberOfPages();
  for(var i=1;i<=tp;i++){
    d.setPage(i);
    d.setFillColor(BG.cream[0],BG.cream[1],BG.cream[2]);
    d.rect(0,PH-10,PW,10,'F');
    d.setDrawColor(237,224,216);d.setLineWidth(.2);d.line(0,PH-10,PW,PH-10);
    pf(d,6.5,false,TX.muted);
    d.text(ascii(title)+' | '+(settings.procId||'ADN')+' | Monsoon Accessorize | Internal use only',PML,PH-4);
    d.text('Page '+i+' of '+tp,PW-PMR,PH-4,{align:'right'});
  }
}

// в”Ђв”Ђ Cover page (light) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function pCover(d,title,subtitle,audience){
  // Light cream background
  d.setFillColor(BG.cream[0],BG.cream[1],BG.cream[2]);d.rect(0,0,PW,PH,'F');
  // Plum accent bar at top
  d.setFillColor(TX.dark[0],TX.dark[1],TX.dark[2]);d.rect(0,0,PW,5,'F');
  // Rose thin line
  d.setDrawColor(TX.rose[0],TX.rose[1],TX.rose[2]);d.setLineWidth(.4);
  d.line(PML,72,PML+PUW,72);
  // Process ID pill
  d.setFillColor(BG.blush[0],BG.blush[1],BG.blush[2]);
  d.setDrawColor(TX.rose[0],TX.rose[1],TX.rose[2]);d.setLineWidth(.3);
  var idTxt=ascii(settings.procId||'ADN-000');
  d.roundedRect(PML,80,8+idTxt.length*2.5,7,2,2,'FD');
  pf(d,7.5,true,TX.rose);d.text(idTxt,PML+4,80+5);
  // Title вЂ” large plum
  pf(d,26,true,TX.dark);
  var tl=d.splitTextToSize(ascii(title),PUW);
  tl.forEach(function(ln,i){d.text(ln,PML,100+i*11)});
  // Subtitle
  var sy=100+tl.length*11+6;
  pf(d,11,false,TX.body);d.text(ascii(subtitle),PML,sy);
  // Metadata card
  var my=sy+16;
  d.setFillColor(BG.page[0],BG.page[1],BG.page[2]);
  d.setDrawColor(237,224,216);d.setLineWidth(.3);
  d.roundedRect(PML,my,PUW,46,3,3,'FD');
  // Left accent
  d.setFillColor(TX.rose[0],TX.rose[1],TX.rose[2]);d.rect(PML,my,3,46,'F');
  pf(d,7,true,TX.rose);d.text('PROCESS DETAILS',PML+8,my+8);
  var meta=[
    ['Owner',settings.procOwner||'\u2014'],['Stage',settings.procStage||'\u2014'],
    ['Priority',settings.procPri||'\u2014'],['Category',settings.procCat||'\u2014'],
    ['Date',new Date().toLocaleDateString('en-GB')],['Audience',audience||'\u2014']
  ];
  meta.forEach(function(m,i){
    var col=i%2===0?0:PUW/2;
    var row=Math.floor(i/2);
    pf(d,6.5,true,TX.muted);d.text(m[0].toUpperCase(),PML+8+col,my+16+row*10);
    pf(d,8.5,false,TX.dark);d.text(ascii(m[1]),PML+8+col,my+21+row*10);
  });
  // Bottom branding
  pf(d,8,false,TX.muted);
  d.text('Monsoon Accessorize  \u00B7  HCM Air Implementation  \u00B7  Go Live: 16 June 2026',PML,PH-22);
  pf(d,7,false,TX.rose);d.text('Generated by Flow Sketchpad',PML,PH-16);
}

// в”Ђв”Ђ Section heading в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function pHead(d,y,title){
  y=pSafe(y,16,d);
  d.setFillColor(TX.dark[0],TX.dark[1],TX.dark[2]);d.rect(PML,y+1,2.5,7,'F');
  pf(d,9.5,true,TX.dark);d.text(ascii(title).toUpperCase(),PML+6,y+7);
  pLine(d,y+10);
  return y+15;
}

// в”Ђв”Ђ Metadata label:value row в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function pMeta(d,y,label,value){
  pf(d,7,true,TX.muted);d.text(ascii(label),PML+5,y);
  pf(d,8,false,TX.dark);d.text(ascii(value),PML+38,y);
  return y+5.5;
}

// в”Ђв”Ђ Step card в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function pCard(d,y,s,idx,opts){
  var showDesc=opts.desc!==false;
  var showSys=opts.sys===true;
  var showConn=opts.conn===true;
  var col=SC[s.type]||[100,116,139];
  var tl=d.splitTextToSize(ascii(s.label||s.type),PUW-24);
  var dl=showDesc&&(s.desc||s.notes)?d.splitTextToSize(ascii(s.desc||s.notes),PUW-24):[];
  var extra=0;
  if(showSys&&s.system)extra++;
  if(s.type==='decision'&&(s.yesTo||s.noTo))extra++;
  if(showConn)extra++;
  if(s.flagged)extra++;
  var bh=Math.max(13,7+tl.length*5+(dl.length?dl.length*4.2+2:0)+extra*5+3);
  y=pSafe(y,bh+4,d);
  // Card background
  d.setFillColor(BG.card[0],BG.card[1],BG.card[2]);
  d.setDrawColor(col[0],col[1],col[2]);d.setLineWidth(.3);
  d.roundedRect(PML,y,PUW,bh,2,2,'FD');
  // Left accent bar
  d.setFillColor(col[0],col[1],col[2]);d.rect(PML,y,3,bh,'F');
  // Number circle
  d.setFillColor(col[0],col[1],col[2]);d.circle(PML+11,y+7,3.5,'F');
  pf(d,7,true,TX.white);d.text(String(idx+1),PML+11,y+8.2,{align:'center'});
  // Type badge
  pf(d,6,true,[col[0],col[1],col[2]]);d.text(ascii(s.type).toUpperCase(),PML+18,y+5);
  // Owner
  if(s.owner){pf(d,7,false,TX.muted);d.text(ascii(s.owner),PML+PUW-3,y+5,{align:'right'})}
  // Label
  pf(d,10,true,TX.dark);
  var ty=y+11;
  tl.forEach(function(ln,i){d.text(ln,PML+18,ty+i*5)});ty+=tl.length*5;
  // Description
  if(dl.length){pf(d,8,false,TX.body);dl.forEach(function(ln,i){d.text(ln,PML+18,ty+i*4.2)});ty+=dl.length*4.2+1}
  // System
  if(showSys&&s.system){pf(d,7,false,[143,168,154]);d.text('System: '+ascii(s.system),PML+18,ty);ty+=5}
  // Decision routes
  if(s.type==='decision'&&(s.yesTo||s.noTo)){
    var rt='';if(s.yesTo)rt+='YES \u2192 '+s.yesTo+'  ';if(s.noTo)rt+='NO \u2192 '+s.noTo;
    pf(d,7,true,[184,92,82]);d.text(ascii(rt),PML+18,ty);ty+=5;
  }
  // Connections
  if(showConn){
    var from=conns.filter(function(c){return c.to===s.id}).map(function(c){var sh=shapes.find(function(x){return x.id===c.from});return sh?(sh.label||sh.type):''}).filter(Boolean);
    var to=conns.filter(function(c){return c.from===s.id}).map(function(c){var sh=shapes.find(function(x){return x.id===c.to});return sh?((c.label?c.label+': ':'')+(sh.label||sh.type)):''}).filter(Boolean);
    var connTxt='';if(from.length)connTxt+='From: '+from.join(', ')+'  ';if(to.length)connTxt+='To: '+to.join(', ');
    if(connTxt){pf(d,6.5,false,TX.muted);d.text(ascii(connTxt).substring(0,85),PML+18,ty);ty+=5}
  }
  // Flag
  if(s.flagged){
    d.setFillColor(255,251,240);d.roundedRect(PML+16,ty-1,PUW-20,5.5,1,1,'F');
    pf(d,7,true,[180,120,40]);d.text('FLAGGED: '+ascii(s.notes||'Review required').substring(0,65),PML+19,ty+3);
  }
  return y+bh+2;
}

// в”Ђв”Ђ Down arrow between cards в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function pArrow(d,y){
  var cx=PML+PUW/2;
  d.setDrawColor(222,184,179);d.setLineWidth(.35);d.line(cx,y,cx,y+3.5);
  d.setFillColor(222,184,179);d.triangle(cx-1.8,y+3.5,cx+1.8,y+3.5,cx,y+6,'F');
  return y+7;
}

// в”Ђв”Ђ Flowchart вЂ” vertical top-to-bottom в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function pFlowchart(d){
  if(typeof html2canvas==='undefined'){toast('Screenshot library not loaded');return}
  // Save current viewport
  var origX=vpX,origY=vpY,origS=vpScale;
  // Hide overlays so screenshot is clean
  var hideEls=['pillBar','minimap','saveInd','voiceInd','searchOv','undoPanel'];
  var origDisplay={};
  hideEls.forEach(function(id){var el=I(id);if(el){origDisplay[id]=el.style.display;el.style.display='none'}});
  var sb=document.querySelector('.statusbar');if(sb){origDisplay._sb=sb.style.display;sb.style.display='none'}
  // Fit tightly to shapes with generous padding
  if(shapes.length){
    var mx=Infinity,my=Infinity,mxX=0,mxY=0;
    shapes.forEach(function(s){mx=Math.min(mx,s.x);my=Math.min(my,s.y);mxX=Math.max(mxX,s.x+s.w);mxY=Math.max(mxY,s.y+s.h)});
    var vpR=I('vp').getBoundingClientRect();
    var tw=mxX-mx+60,th=mxY-my+60;
    vpScale=Math.min(2.5,Math.max(.25,Math.min((vpR.width-40)/tw,(vpR.height-40)/th)));
    vpX=(vpR.width-tw*vpScale)/2-(mx-30)*vpScale;
    vpY=(vpR.height-th*vpScale)/2-(my-30)*vpScale;
    applyVP();
  }
  // Wait for render
  await new Promise(function(r){setTimeout(r,300)});
  var vpEl=I('vp');
  var vpRect=vpEl.getBoundingClientRect();
  // Page dimensions for landscape A4
  var pw=297,ph=210,mg=12;
  try{
    var canvas=await html2canvas(vpEl,{
      backgroundColor:'#FAF6F2',
      scale:2,
      width:Math.round(vpRect.width),
      height:Math.round(vpRect.height),
      useCORS:true,
      logging:false,
      removeContainer:true
    });
    var imgData=canvas.toDataURL('image/png');
    // Add LANDSCAPE page вЂ” correct jsPDF 2.x syntax
    d.addPage('a4','l');
    // в”Ђв”Ђ Document identity header в”Ђв”Ђ
    // Rose accent bar at top

// в”Ђв”Ђ Swimlane table в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function pSwimlane(d,y,steps){
  y=pSafe(y,12,d);y=pHead(d,y,'Swimlane View');

  steps.forEach(function(s){if(s.owner&&owners.indexOf(s.owner)===-1)owners.push(s.owner)});

  owners.forEach(function(o){
    d.setFillColor(BG.blush[0],BG.blush[1],BG.blush[2]);
    d.roundedRect(hx,y,colW,7,1,1,'FD');
    pf(d,6,true,TX.dark);d.text(ascii(o).substring(0,12),hx+colW/2,y+5,{align:'center'});

    var col=SC[s.type]||[100,116,139];
    owners.forEach(function(o){
      if(s.owner===o||(!s.owner&&o==='Unassigned')){
        d.setFillColor(col[0],col[1],col[2]);d.setGlobalAlpha&&d.setGlobalAlpha(0.12);
        d.roundedRect(rx+1,y+.5,colW-2,5.5,1,1,'F');

// в”Ђв”Ђ Compliance summary в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function pComply(d,y){
  var checks=buildComplianceChecks();if(!checks.length)return y;
  y=pSafe(y,12,d);y=pHead(d,y,'Compliance Summary');
  var passed=checks.filter(function(c){return c.pass||wsOverrides['g_'+c.key]}).length;
  var total=checks.length,pct=Math.round((passed/total)*100);
  // Progress bar
  d.setFillColor(237,224,216);d.roundedRect(PML,y,PUW,4.5,2,2,'F');
  var bc=pct===100?[143,168,154]:[201,132,122];
  d.setFillColor(bc[0],bc[1],bc[2]);d.roundedRect(PML,y,Math.max(4,PUW*(pct/100)),4.5,2,2,'F');
  pf(d,6,true,TX.white);d.text(pct+'%',PML+Math.max(4,PUW*(pct/100))/2,y+3.3,{align:'center'});y+=8;
  pf(d,7.5,false,TX.dark);d.text(passed+' of '+total+' checks passed',PML,y);y+=7;
  checks.forEach(function(c){
    y=pSafe(y,7,d);
    var pass=c.pass||wsOverrides['g_'+c.key];
    d.setFillColor(pass?BG.cream[0]:253,pass?BG.cream[1]:248,pass?BG.cream[2]:244);
    d.roundedRect(PML,y,PUW,5.5,1,1,'F');
    d.setFillColor(pass?143:201,pass?168:132,pass?154:122);d.circle(PML+4.5,y+2.8,1.8,'F');
    pf(d,5,true,TX.white);d.text(pass?'\u2713':'!',PML+4.5,y+3.5,{align:'center'});
    pf(d,7,false,TX.dark);d.text(ascii(c.lbl),PML+10,y+4);
    if(c.detail){pf(d,6,false,TX.muted);d.text(ascii(c.detail).substring(0,35),PML+PUW-3,y+4,{align:'right'})}
    y+=6.5;
  });
  return y+4;
}

// в”Ђв”Ђ Summary text generator в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function pSummary(steps){
  var title=ascii(I('docTitle').value)||'This process';
  var owner=settings.procOwner||'the process owner';
  var decs=steps.filter(function(s){return s.type==='decision'}).length;
  var sys=[];steps.forEach(function(s){if(s.system&&sys.indexOf(s.system)===-1)sys.push(s.system)});
  var fl=steps.filter(function(s){return s.flagged}).length;
  var first=steps.find(function(s){return s.type==='terminal'});
  var last=steps.slice().reverse().find(function(s){return s.type==='terminal'});
  var t=title+' is owned by '+owner+' and consists of '+steps.length+' steps';
  if(decs)t+=', including '+decs+' decision point'+(decs>1?'s':'');
  t+='. ';
  if(first&&first.label)t+='The process begins when '+ascii(first.label).toLowerCase()+'. ';
  if(last&&last.label&&last!==first)t+='It concludes when '+ascii(last.label).toLowerCase()+'. ';
  if(sys.length)t+='Systems involved: '+sys.join(', ')+'. ';
  if(fl)t+=fl+' risk'+(fl>1?'s have':' has')+' been flagged for review.';
  else t+='No risks have been flagged.';
  return t;
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// 1. FULL PROCESS DOCUMENT
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
async function generateFullPDF(steps){
  if(!window.jspdf){toast('PDF library not loaded');return}

    {l:'Risks',v:String(steps.filter(function(s){return s.flagged}).length)},
    {l:'Owners',v:String(new Set(steps.map(function(s){return s.owner}).filter(Boolean)).size)}
  ];
  var mw=PUW/mets.length;
  mets.forEach(function(m,i){
    var mx=PML+i*mw;
    d.setFillColor(BG.card[0],BG.card[1],BG.card[2]);d.setDrawColor(237,224,216);d.setLineWidth(.2);
    d.roundedRect(mx+1,y,mw-2,14,2,2,'FD');

  // Metadata
  y=pHead(d,y,'Process Metadata');
  d.setFillColor(BG.card[0],BG.card[1],BG.card[2]);d.setDrawColor(237,224,216);d.setLineWidth(.2);
  d.roundedRect(PML,y,PUW,34,2,2,'FD');y+=5;
  y=pMeta(d,y,'Process ID',settings.procId||'\u2014');
  y=pMeta(d,y,'Category',settings.procCat||'\u2014');
  y=pMeta(d,y,'Owner',settings.procOwner||'\u2014');
  y=pMeta(d,y,'Stage',settings.procStage||'\u2014');
  y=pMeta(d,y,'Priority',settings.procPri||'\u2014');
  y=pMeta(d,y,'Swimlanes',settings.swimlanes||'\u2014');y+=6;
  // Flowchart screenshot
  await pFlowchart(d);
  // Step details вЂ” new page
  d.addPage('a4','p');y=20;
  y=pHead(d,y,'Step-by-Step Detail');
  steps.forEach(function(s,idx){
    y=pCard(d,y,s,idx,{desc:true,sys:true,conn:true});

  });
  // Swimlane вЂ” new page
  d.addPage('a4','p');y=20;

  if(steps.some(function(s){return s.flagged})){

async function generateTechPDF(steps){

  pf(d,6.5,true,[143,168,154]);d.text('TECHNICAL SPECIFICATION',PML,11);
  pf(d,12,true,TX.dark);d.text(ascii(I('docTitle').value||'Process'),PML,19);
  pf(d,7,false,TX.muted);d.text((settings.procId||'ADN')+' \u00B7 '+new Date().toLocaleDateString('en-GB')+' \u00B7 IT / Zellis',PML,24);

  y=pHead(d,y,'Systems Inventory');

      d.roundedRect(PML,y,PUW,9,2,2,'FD');

      y+=11;
    });
  } else {pf(d,7.5,false,TX.muted);d.text('No systems recorded.',PML,y);y+=7}
  y+=4;

  d.addPage('a4','p');y=20;

      y+=6.5;

  await pFlowchart(d);
  // Step detail вЂ” new page

  steps.forEach(function(s,idx){

}

function doExcelExport(steps){
  var wb=XLSX.utils.book_new();
  var hdr=[['Process ID','Step No','Step Title','Step Type','Description','Owner','System','Yes Route','No Route','Notes','Flagged']];
  var rows=steps.map(function(s,i){return[settings.procId||'',String(i+1),s.label||'',s.type,s.desc||s.notes||'',s.owner||'',s.system||'',s.yesTo||'',s.noTo||'',s.notes||'',s.flagged?'Y':'']});
  var ws=XLSX.utils.aoa_to_sheet(hdr.concat(rows));
  ws['!cols']=[{wch:10},{wch:7},{wch:28},{wch:11},{wch:40},{wch:18},{wch:16},{wch:20},{wch:20},{wch:30},{wch:6}];
  XLSX.utils.book_append_sheet(wb,ws,'All Steps');
  var cHdr=[['From Step','To Step','Label','Style']];
  var cRows=conns.map(function(c){var src=shapes.find(function(s){return s.id===c.from});var tgt=shapes.find(function(s){return s.id===c.to});return[src?src.label||src.type:'',tgt?tgt.label||tgt.type:'',c.label||'',c.style||'solid']});
  var cs=XLSX.utils.aoa_to_sheet(cHdr.concat(cRows));cs['!cols']=[{wch:28},{wch:28},{wch:14},{wch:10}];
  XLSX.utils.book_append_sheet(wb,cs,'Connections');
  var flagged=steps.filter(function(s){return s.flagged});
  if(flagged.length){var rHdr=[['Step No','Step Title','Owner','Risk Notes']];var rRows=flagged.map(function(s){return[String(steps.indexOf(s)+1),s.label||'',s.owner||'',s.notes||'']});var rs=XLSX.utils.aoa_to_sheet(rHdr.concat(rRows));rs['!cols']=[{wch:7},{wch:28},{wch:18},{wch:40}];XLSX.utils.book_append_sheet(wb,rs,'Risks')}
  var mData=[['Field','Value'],['Process ID',settings.procId||''],['Process Name',I('docTitle').value||''],['Owner',settings.procOwner||''],['Category',settings.procCat||''],['Stage',settings.procStage||''],['Priority',settings.procPri||''],['Swimlanes',settings.swimlanes||''],['Total Steps',String(steps.length)],['Exported',new Date().toLocaleString('en-GB')]];
  var ms=XLSX.utils.aoa_to_sheet(mData);ms['!cols']=[{wch:14},{wch:30}];XLSX.utils.book_append_sheet(wb,ms,'Metadata');
  var out=XLSX.write(wb,{bookType:'xlsx',type:'array'});var blob=new Blob([out],{type:'application/octet-stream'});var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download=(settings.procId||'ADN')+'_'+ascii(I('docTitle').value).replace(/[^a-zA-Z0-9]/g,'_')+'.xlsx';
  document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url)},1000);
  toast('Excel exported (4 sheets)');
}

  presStep=0;I('presOverlay').classList.add('open');renderPresentStep();
}
function endPresentation(){I('presOverlay').classList.remove('open')}
function renderPresentStep(){
  var s=shapes.filter(function(s){return s.type!=='container'})[presStep];if(!s)return;
  var total=shapes.filter(function(s){return s.type!=='container'}).length;
  var SCOLS={action:'#C9847A',decision:'#B85C52',terminal:'#8FA89A',system:'#7A6068'};
  var col=SCOLS[s.type]||'#7A6068';

  var pc=I('presCanvas');pc.innerHTML='';
  var card=document.createElement('div');
  card.style.cssText='position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);background:#FFFDFB;border-radius:16px;border:2px solid '+col+';padding:28px 36px;max-width:550px;width:90%;text-align:center;box-shadow:0 16px 50px rgba(61,43,53,.35)';
  card.innerHTML='<div style="font-size:10px;font-weight:700;color:'+col+';text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px">'+s.type+'</div>'+
    '<div style="font-size:24px;font-weight:800;color:#2A1F22;line-height:1.2;margin-bottom:12px">'+esc(s.label||'(unlabelled)')+'</div>'+
    (s.owner?'<div style="font-size:13px;color:#7A6068;margin-bottom:6px">Owner: '+esc(s.owner)+'</div>':'')+
    (s.desc||s.notes?'<div style="font-size:13px;color:#7A6068;line-height:1.5;margin-top:10px;padding-top:10px;border-top:1px solid var(--border)">'+esc(s.desc||s.notes)+'</div>':'')+
    (s.flagged?'<div style="margin-top:10px;padding:6px 12px;background:#FFFBEB;border-radius:6px;font-size:12px;font-weight:700;color:#92400E">вљ  '+esc(s.notes||'Review required')+'</div>':'');
  pc.appendChild(card);
}
function presNext(){var total=shapes.filter(function(s){return s.type!=='container'}).length;if(presStep<total-1){presStep++;renderPresentStep()}}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// VOICE
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function toggleVoice(){
  if(voiceActive){stopVoice();return}
  if(!('webkitSpeechRecognition' in window||'SpeechRecognition' in window)){toast('Voice not supported');return}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  voiceRec=new SR();voiceRec.continuous=true;voiceRec.interimResults=false;voiceRec.lang='en-GB';
  voiceRec.onresult=function(ev){
    var txt=ev.results[ev.results.length-1][0].transcript;
    var r=I('vp').getBoundingClientRect();
    var cx=(r.width/2-vpX)/vpScale,cy=(r.height/2-vpY)/vpScale;
    addNote(cx,cy);
    var note=I('noteLayer').lastChild;if(note){var ta=note.querySelector('textarea');if(ta)ta.value=txt}
    toast('Voice note: "'+txt.substring(0,30)+'"');
  };
  voiceRec.onerror=function(){stopVoice()};
  voiceRec.start();voiceActive=true;
  I('voiceInd').style.display='flex';toast('Recording...');
}
function stopVoice(){if(voiceRec)voiceRec.stop();voiceActive=false;I('voiceInd').style.display='none'}

// INIT
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

      '<strong>Apple Pencil</strong> draws and places shapes.<br><strong>Finger</strong> pans and zooms.<br><strong>Pinch</strong> to zoom in/out.<br><strong>Double-tap</strong> a shape to rename.<br><strong>Lasso</strong> tool for bulk select.<br><strong>Minimap</strong> (bottom-right) for navigation.<br><strong>Auto-layout</strong> tidies your flow.<br><strong>Cmd+F</strong> to search shapes.</div></div>'+
      '<div style="display:flex;gap:4px;margin-top:6px"><button class="mbtn mbtn-p" style="flex:1" onclick="openAIInterview()">вњ¦ AI Build</button><button class="mbtn mbtn-s" style="flex:1" onclick="openTemplates()">Templates</button></div>';
  }
},200);
