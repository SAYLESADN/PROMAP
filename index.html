<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ADN Flow Sketchpad</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#3D2B35;--rose:#C9847A;--vlt:#F9F0EE;--vmid:#DEB8B3;
  --bg:#FAF6F2;--surface:#FFFDFB;--border:#EDE0D8;--border2:#DEC8BF;
  --text:#2A1F22;--text2:#7A6068;--text3:#B09A95;
  --sage:#8FA89A;--glt:#F0F5F2;
  --red:#B85C52;--rlt:#FDF0EE;
  --plum:#3D2B35;--blush:#F5EDE8;--cream:#FAF7F4;
  --r:10px;--rs:6px;--rl:16px;
  --sh:0 2px 12px rgba(61,43,53,.08);
  --tb-h:48px;--st-h:32px;
  --grid:20px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px;user-select:none}

/* в•ђв•ђв•ђ TOPBAR в•ђв•ђв•ђ */
.tb{height:var(--tb-h);background:var(--plum);display:flex;align-items:center;padding:0 12px;gap:8px;z-index:200;flex-shrink:0;position:relative}
.tb-brand{display:flex;align-items:center;gap:6px;flex-shrink:0}
.tb-ico{width:28px;height:28px;background:linear-gradient(135deg,var(--rose),var(--red));border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;color:#fff}
.tb-name{font-size:12px;font-weight:700;color:#fff;white-space:nowrap}
.tb-sep{width:1px;height:16px;background:rgba(255,255,255,.15);flex-shrink:0}
.tb-title{background:transparent;border:none;color:#fff;font-size:12px;font-weight:600;font-family:inherit;outline:none;padding:4px 8px;border-radius:5px;min-width:120px;max-width:200px}
.tb-title:hover{background:rgba(255,255,255,.08)}
.tb-title:focus{background:rgba(255,255,255,.12)}
.tb-phase{display:flex;gap:2px;background:rgba(255,255,255,.08);border-radius:6px;padding:2px}
.tp{padding:4px 10px;border:none;border-radius:4px;font-size:10px;font-weight:600;font-family:inherit;cursor:pointer;color:rgba(255,255,255,.45);background:transparent;transition:.12s;white-space:nowrap}
.tp:hover{color:rgba(255,255,255,.8)}
.tp.on{background:var(--rose);color:#fff}
.tb-r{display:flex;gap:5px;margin-left:auto;align-items:center}
.tbtn{padding:4px 10px;border:none;border-radius:5px;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;transition:.12s;white-space:nowrap}
.tbtn-v{background:var(--rose);color:#fff}.tbtn-v:hover{background:var(--red)}
.tbtn-s{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.15)}.tbtn-s:hover{background:rgba(255,255,255,.2)}
.tbtn-a{background:rgba(184,92,82,.7);color:#fff}.tbtn-a:hover{background:var(--red)}

/* в•ђв•ђв•ђ SHELL в•ђв•ђв•ђ */
.shell{display:flex;height:calc(100vh - var(--tb-h));position:relative}

/* в•ђв•ђв•ђ CANVAS в•ђв•ђв•ђ */
.canvas-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;min-width:0}
.canvas-vp{flex:1;overflow:hidden;position:relative;background:var(--bg);cursor:crosshair;touch-action:none}
.grid-bg{position:absolute;inset:0;pointer-events:none;opacity:.4}
.canvas-inner{position:absolute;top:0;left:0;transform-origin:0 0}
canvas#inkLayer{position:absolute;top:0;left:0;pointer-events:none}
svg#shapeLayer{position:absolute;top:0;left:0;overflow:visible}
div#noteLayer{position:absolute;top:0;left:0}

/* в•ђв•ђв•ђ FLOATING PILL TOOLBAR в•ђв•ђв•ђ */
.pill-bar{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);background:rgba(255,253,251,.96);border:1px solid var(--border);border-radius:28px;display:flex;align-items:center;padding:4px 6px;gap:2px;z-index:100;box-shadow:0 4px 24px rgba(61,43,53,.15);backdrop-filter:blur(12px);transition:all .25s ease}
.pill-bar.collapsed{border-radius:50%;padding:4px;width:48px;height:48px;justify-content:center;cursor:pointer}
.pill-bar.collapsed .pill-section,.pill-bar.collapsed .pill-sep,.pill-bar.collapsed .pill-expand-label{display:none}
.pill-bar.collapsed .pill-toggle-btn{display:flex}
.pill-section{display:flex;gap:1px;align-items:center}
.pill-sep{width:1px;height:24px;background:var(--border);margin:0 4px;flex-shrink:0;opacity:.5}
.pill-btn{width:40px;height:40px;border:none;border-radius:12px;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0px;font-family:inherit;transition:.12s;position:relative;color:var(--text2)}
.pill-btn:hover{background:var(--blush);color:var(--rose)}
.pill-btn.on{background:var(--rose);color:#fff;box-shadow:0 2px 8px rgba(201,132,122,.35)}
.pill-btn .p-ico{font-size:16px;line-height:1}
.pill-btn .p-lbl{font-size:7px;font-weight:700;line-height:1;letter-spacing:.2px}
.pill-toggle-btn{display:none;width:40px;height:40px;border:none;border-radius:50%;background:var(--rose);color:#fff;font-size:18px;cursor:pointer;align-items:center;justify-content:center}
.pill-expand-label{font-size:7px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;padding:0 3px;white-space:nowrap}
/* Colour indicator on pill */
.pill-color-dot{width:14px;height:14px;border-radius:4px;border:2px solid var(--border);cursor:pointer;transition:.12s}
.pill-color-dot:hover{transform:scale(1.15)}
/* Layer dots on pill */
.pill-layer{display:flex;gap:3px;align-items:center}
.pill-ldot{width:10px;height:10px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:.12s;opacity:.35}
.pill-ldot.on{opacity:1;border-color:var(--navy)}

/* в•ђв•ђв•ђ MINIMAP в•ђв•ђв•ђ */
.minimap{position:absolute;bottom:70px;right:12px;width:160px;height:110px;background:rgba(255,253,251,.92);border:1px solid var(--border);border-radius:10px;z-index:90;box-shadow:0 2px 12px rgba(61,43,53,.1);overflow:hidden;cursor:pointer;backdrop-filter:blur(8px)}
.minimap canvas{width:100%;height:100%}
.minimap-vp{position:absolute;border:2px solid var(--rose);border-radius:2px;pointer-events:none;opacity:.6}

/* в•ђв•ђв•ђ STATUS BAR в•ђв•ђв•ђ */
.statusbar{height:var(--st-h);background:var(--cream);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;gap:12px;flex-shrink:0}
.sb-item{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px}
.sb-item strong{color:var(--text2);font-weight:700}
.sb-btns{display:flex;gap:4px;margin-left:auto}
.sb-btn{padding:2px 8px;border:1px solid var(--border);border-radius:4px;font-size:9px;font-weight:600;font-family:inherit;cursor:pointer;background:#fff;color:var(--text2);transition:.12s}
.sb-btn:hover{border-color:var(--rose);color:var(--rose)}

/* в•ђв•ђв•ђ RIGHT PANEL в•ђв•ђв•ђ */
.rpanel{width:280px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s;flex-shrink:0}
.rpanel.collapsed{width:0;border-left:none}
.rp-head{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;background:var(--blush)}
.rp-title{font-size:11px;font-weight:700;color:var(--plum);letter-spacing:.3px;text-transform:uppercase}
.rp-close{width:22px;height:22px;border:none;background:var(--bg);border-radius:5px;cursor:pointer;color:var(--text2);font-size:13px;display:flex;align-items:center;justify-content:center}
.rp-body{flex:1;overflow-y:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}

/* в•ђв•ђв•ђ SEARCH OVERLAY в•ђв•ђв•ђ */
.search-ov{position:absolute;top:12px;left:50%;transform:translateX(-50%);width:340px;max-width:90%;background:var(--surface);border:1px solid var(--border);border-radius:12px;box-shadow:0 8px 32px rgba(61,43,53,.18);z-index:150;display:none;overflow:hidden}
.search-ov.open{display:block}
.search-inp{width:100%;padding:10px 14px;border:none;font-size:13px;font-family:inherit;outline:none;background:transparent;color:var(--text)}
.search-results{max-height:200px;overflow-y:auto;border-top:1px solid var(--border)}
.search-item{padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:.1s}
.search-item:hover{background:var(--blush)}
.search-item-num{width:20px;height:20px;border-radius:5px;background:var(--rose);color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.search-item-name{font-size:12px;font-weight:600;color:var(--text)}
.search-item-type{font-size:9px;color:var(--text3);margin-left:auto}

/* в•ђв•ђв•ђ SHARED FORM ELEMENTS в•ђв•ђв•ђ */
.sc-field{margin-bottom:6px;display:flex;flex-direction:column;gap:2px}
.sc-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.4px}
.sc-inp{width:100%;padding:5px 8px;border:1.5px solid var(--border);border-radius:5px;font-size:11px;font-family:inherit;outline:none;background:#fff;color:var(--text);transition:.12s}
.sc-inp:focus{border-color:var(--rose)}
.sc-sel{width:100%;padding:5px 8px;border:1.5px solid var(--border);border-radius:5px;font-size:11px;font-family:inherit;outline:none;background:#fff;color:var(--text)}

/* в•ђв•ђв•ђ AI CARD в•ђв•ђв•ђ */
.ai-card{background:var(--cream);border:none;border-left:3px solid var(--sage);border-radius:0 var(--r) var(--r) 0;padding:10px}
.ai-q{font-size:11px;font-weight:500;color:var(--plum);margin-bottom:6px;line-height:1.5;font-style:italic}
.ai-inp{width:100%;min-height:50px;border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:11px;font-family:inherit;resize:none;outline:none;background:#fff;color:var(--text)}
.ai-inp:focus{border-color:var(--rose)}
.ai-btn{padding:5px 10px;border-radius:5px;font-size:10px;font-weight:700;font-family:inherit;cursor:pointer;border:none;transition:.12s}
.ai-save{background:var(--rose);color:#fff}.ai-save:hover{background:var(--red)}
.ai-skip{background:rgba(143,168,154,.15);color:var(--sage)}.ai-skip:hover{background:rgba(143,168,154,.25)}

/* в•ђв•ђв•ђ MODALS в•ђв•ђв•ђ */
.ov{position:fixed;inset:0;background:rgba(30,20,50,.35);display:none;align-items:center;justify-content:center;z-index:800;padding:16px;backdrop-filter:blur(2px)}
.ov.open{display:flex}
.modal{background:var(--surface);border-radius:var(--rl);padding:18px 20px;width:100%;max-width:440px;box-shadow:0 12px 40px rgba(45,58,74,.18);max-height:85vh;overflow-y:auto}
.modal h2{font-size:14px;font-weight:800;margin-bottom:3px;color:var(--text)}
.modal-sub{font-size:11px;color:var(--text2);margin-bottom:12px}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.mrow1{grid-template-columns:1fr}
.mg{display:flex;flex-direction:column;gap:2px}
.ml{font-size:9px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px}
.mi,.ms,.mt{width:100%;padding:6px 9px;border:1.5px solid var(--border);border-radius:6px;font-size:11px;font-family:inherit;outline:none;color:var(--text);background:#fff}
.mi:focus,.ms:focus,.mt:focus{border-color:var(--rose)}
.mt{resize:vertical;min-height:50px}
.macts{display:flex;gap:6px;justify-content:flex-end;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.mbtn{padding:6px 14px;border-radius:6px;border:none;font-size:11px;font-weight:600;font-family:inherit;cursor:pointer;transition:.12s}
.mbtn-p{background:var(--rose);color:#fff}.mbtn-p:hover{background:var(--red)}
.mbtn-s{background:var(--bg);color:var(--text2);border:1.5px solid var(--border)}.mbtn-s:hover{border-color:var(--rose);color:var(--rose)}

/* в•ђв•ђв•ђ SHAPES в•ђв•ђв•ђ */
.shape{cursor:pointer;transition:filter .1s}
.shape:hover{filter:drop-shadow(0 2px 6px rgba(201,132,122,.25))}
.shape.sel-shape .shape-bg{stroke-width:2.5!important}
.shape-label{pointer-events:none;font-family:'Inter',sans-serif;font-weight:600}
.conn-path{fill:none;stroke:var(--rose);stroke-width:1.5;cursor:pointer}
.conn-path:hover{stroke:var(--red);stroke-width:2.5}
.conn-path.sel-conn{stroke:var(--red);stroke-dasharray:6,3}

/* в•ђв•ђв•ђ STICKY NOTES в•ђв•ђв•ђ */
.sticky{position:absolute;background:var(--blush);border:1px solid var(--border2);border-radius:10px;padding:10px;min-width:120px;min-height:80px;cursor:move;resize:both;overflow:hidden;box-shadow:0 2px 12px rgba(61,43,53,.1)}
.sticky-head{display:flex;justify-content:space-between;margin-bottom:4px;align-items:center}
.sticky-title{font-size:8px;font-weight:700;color:var(--rose);text-transform:uppercase;letter-spacing:.6px}
.sticky-del{border:none;background:none;cursor:pointer;color:var(--text3);font-size:12px;line-height:1;padding:0}
.sticky-body{width:100%;min-height:45px;border:none;background:transparent;font-size:11px;font-family:inherit;color:var(--text);resize:none;outline:none;line-height:1.5}

/* в•ђв•ђв•ђ COLOUR PICKER POPUP в•ђв•ђв•ђ */
.cpicker{position:absolute;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px;z-index:500;box-shadow:var(--sh);display:none;gap:4px;flex-wrap:wrap;width:150px}
.cpicker.open{display:flex}
.cp-swatch{width:22px;height:22px;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:.1s}
.cp-swatch:hover,.cp-swatch.on{border-color:var(--navy);transform:scale(1.12)}

/* в•ђв•ђв•ђ LASSO SELECTION в•ђв•ђв•ђ */
.lasso-rect{position:absolute;border:2px dashed var(--rose);background:rgba(201,132,122,.08);pointer-events:none;z-index:60;border-radius:3px}

/* в•ђв•ђв•ђ UNDO HISTORY PANEL в•ђв•ђв•ђ */
.undo-panel{position:absolute;top:60px;right:12px;width:200px;background:var(--surface);border:1px solid var(--border);border-radius:10px;z-index:95;box-shadow:0 4px 16px rgba(61,43,53,.12);display:none;overflow:hidden}
.undo-panel.open{display:block}
.undo-head{padding:8px 10px;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;border-bottom:1px solid var(--border);background:var(--blush);display:flex;justify-content:space-between;align-items:center}
.undo-list{max-height:200px;overflow-y:auto}
.undo-item{padding:6px 10px;font-size:10px;color:var(--text2);cursor:pointer;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--bg)}
.undo-item:hover{background:var(--blush);color:var(--rose)}
.undo-ico{font-size:12px}

/* в•ђв•ђв•ђ PRESENTATION в•ђв•ђв•ђ */
.present-overlay{position:fixed;inset:0;background:#2A1F22;z-index:9000;display:none;flex-direction:column}
.present-overlay.open{display:flex}
.pres-canvas{flex:1;position:relative;overflow:hidden}
.pres-nav{height:56px;background:rgba(42,31,34,.95);display:flex;align-items:center;justify-content:center;gap:14px;flex-shrink:0}
.pres-btn{padding:7px 18px;border:none;border-radius:8px;font-size:12px;font-weight:500;font-family:inherit;cursor:pointer;background:rgba(201,132,122,.3);color:#fff;transition:.12s}
.pres-btn:hover{background:rgba(201,132,122,.5)}
.pres-step-info{font-size:12px;color:rgba(255,255,255,.5);min-width:90px;text-align:center}
.pres-close{position:absolute;top:12px;right:12px;padding:5px 12px;background:rgba(201,132,122,.4);color:#fff;border:1px solid rgba(201,132,122,.5);border-radius:6px;font-size:11px;font-weight:500;cursor:pointer;z-index:10}

/* в•ђв•ђв•ђ EXPORT CARDS в•ђв•ђв•ђ */
.exp-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:10px;cursor:pointer;transition:.15s;margin-bottom:5px}
.exp-card:hover,.exp-card.on{border-color:var(--rose);background:var(--blush)}
.exp-ico{font-size:18px;margin-bottom:3px}
.exp-name{font-size:11px;font-weight:700;color:var(--text)}
.exp-desc{font-size:9px;color:var(--text3);margin-top:2px}
.exp-tags{display:flex;gap:3px;margin-top:5px;flex-wrap:wrap}
.exp-tag{font-size:8px;font-weight:700;padding:2px 5px;border-radius:3px;background:var(--bg);color:var(--text2);border:1px solid var(--border)}

/* в•ђв•ђв•ђ TEMPLATE CARDS в•ђв•ђв•ђ */
.tmpl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:9px 10px;cursor:pointer;transition:.15s;margin-bottom:4px}
.tmpl-card:hover{border-color:var(--rose);background:var(--blush)}
.tmpl-name{font-size:11px;font-weight:700;color:var(--text)}
.tmpl-steps{font-size:9px;color:var(--text3);margin-top:2px}

/* в•ђв•ђв•ђ FLAG / GAP в•ђв•ђв•ђ */
.flag-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:5px;border:1px solid var(--border);cursor:pointer;margin-top:4px;transition:.15s}
.flag-row.on{border-color:var(--rose);background:var(--blush)}
.gap-item{display:flex;gap:6px;padding:6px 8px;border-radius:5px;margin-bottom:3px}
.gap-warn{background:#FDF5F0;border:1px solid var(--border2)}
.gap-err{background:var(--rlt);border:1px solid #DEB8B3}
.gap-ico{font-size:12px;flex-shrink:0}
.gap-txt{font-size:10px;font-weight:600;color:var(--text)}

/* в•ђв•ђв•ђ ARROW OPTS в•ђв•ђв•ђ */
.arrow-opts{display:flex;flex-direction:column;gap:4px;padding:4px}
.ao{padding:5px 8px;border:1.5px solid var(--border);border-radius:5px;cursor:pointer;font-size:10px;font-weight:600;color:var(--text2);display:flex;align-items:center;gap:6px;transition:.12s}
.ao:hover,.ao.on{border-color:var(--rose);background:var(--vlt);color:var(--rose)}

/* в•ђв•ђв•ђ SAVE INDICATOR в•ђв•ђв•ђ */
.save-ind{position:absolute;top:12px;right:12px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;z-index:90;transition:.3s;pointer-events:none}
.save-ind.saving{background:var(--rose);color:#fff;opacity:1}
.save-ind.saved{background:var(--sage);color:#fff;opacity:1}
.save-ind.hidden{opacity:0}

/* в•ђв•ђв•ђ VOICE в•ђв•ђв•ђ */
.voice-ind{position:absolute;top:12px;left:50%;transform:translateX(-50%);background:var(--rose);color:#fff;padding:5px 12px;border-radius:16px;font-size:11px;font-weight:700;display:none;align-items:center;gap:5px;z-index:90;pointer-events:none}
.voice-dot{width:7px;height:7px;border-radius:50%;background:#fff;animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* в•ђв•ђв•ђ TOASTS в•ђв•ђв•ђ */
.toasts{position:fixed;bottom:80px;right:16px;z-index:9999;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.toast{background:var(--navy);color:#fff;padding:8px 14px;border-radius:var(--r);font-size:11px;font-weight:600;box-shadow:0 4px 16px rgba(45,58,74,.2);animation:tin .18s ease}
@keyframes tin{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}

::-webkit-scrollbar{width:3px;height:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--border2);border-radius:9px}
</style>
</head>
<body>

<!-- в•ђв•ђв•ђ TOPBAR в•ђв•ђв•ђ -->
<div class="tb">
  <div class="tb-brand">
    <div class="tb-ico">вњ¦</div>
    <div class="tb-name">Flow Sketchpad</div>
  </div>
  <div class="tb-sep"></div>
  <input class="tb-title" id="docTitle" value="Untitled Process" placeholder="Process name...">
  <div class="tb-sep"></div>

function I(id){return document.getElementById(id)}

function ascii(s){return String(s||'').replace(/[^\x20-\x7E]/g,' ').replace(/\s+/g,' ').trim()}

function snap(v){return snapGrid?Math.round(v/snapGrid)*snapGrid:v}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ

function applyVP(){
  I('ci').style.transform='translate('+vpX+'px,'+vpY+'px) scale('+vpScale+')';
  I('zoomLbl').textContent=Math.round(vpScale*100)+'%';
  updateMinimap();
}
function fitScreen(){
  if(!shapes.length){vpX=50;vpY=50;vpScale=1;applyVP();return}
  var mx=Infinity,my=Infinity,mxX=0,mxY=0;
  shapes.forEach(function(s){mx=Math.min(mx,s.x);my=Math.min(my,s.y);mxX=Math.max(mxX,s.x+s.w);mxY=Math.max(mxY,s.y+s.h)});
  var r=I('vp').getBoundingClientRect();
  var tw=mxX-mx+120,th=mxY-my+120;
  vpScale=Math.min(2,Math.max(.2,Math.min((r.width-80)/tw,(r.height-80)/th)));
  vpX=(r.width-tw*vpScale)/2-mx*vpScale+40;
  vpY=40;
  applyVP();
}
function zoomIn(){vpScale=Math.min(4,vpScale*1.15);applyVP()}
function zoomOut(){vpScale=Math.max(.1,vpScale*.87);applyVP()}

// Wheel zoom
I('vp').addEventListener('wheel',function(e){
  e.preventDefault();
  var fac=e.deltaY<0?1.1:.91;
  var r=I('vp').getBoundingClientRect();
  var mx=e.clientX-r.left,my=e.clientY-r.top;
  vpX=mx-(mx-vpX)*fac;vpY=my-(my-vpY)*fac;
  vpScale=Math.min(4,Math.max(.1,vpScale*fac));
  applyVP();
},{passive:false});

function resizeCanvas(){
  var vp=I('vp');
  var W=Math.max(4000,vp.clientWidth*4),H=Math.max(4000,vp.clientHeight*4);
  var ink=I('inkLayer');ink.width=W;ink.height=H;
  var sl=I('shapeLayer');sl.setAttribute('width',W);sl.setAttribute('height',H);
}

// PILL TOOLBAR COLLAPSE/EXPAND
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function collapsePill(){I('pillBar').classList.add('collapsed')}
function expandPill(){I('pillBar').classList.remove('collapsed')}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// POINTER EVENTS вЂ” PENCIL vs FINGER
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function canvasPoint(e){
  var r=I('vp').getBoundingClientRect();
  return{x:(e.clientX-r.left-vpX)/vpScale,y:(e.clientY-r.top-vpY)/vpScale};
}
function isPencilOrMouse(e){return e.pointerType==='pen'||e.pointerType==='mouse'}

I('vp').addEventListener('pointerdown',function(e){
  // Skip UI elements
  if(e.target.closest('.pill-bar,.rpanel,.statusbar,.tb,.modal,.cpicker,.minimap,.search-ov,.undo-panel,.save-ind'))return;
  var tag=e.target.tagName;
  if(tag==='BUTTON'||tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA')return;
  e.preventDefault();
  var pt=canvasPoint(e);

  // FINGER = always pan (unless we're in lasso mode on mouse)
  if(e.pointerType==='touch'){
    vpDrag=true;vpDx=e.clientX-vpX;vpDy=e.clientY-vpY;
    I('vp').style.cursor='grabbing';return;
  }

  // PENCIL or MOUSE вЂ” use current tool
  if(tool==='pan'){vpDrag=true;vpDx=e.clientX-vpX;vpDy=e.clientY-vpY;I('vp').style.cursor='grabbing';return}
  if(tool==='select'){handleSelectDown(e,pt);return}
  if(tool==='lasso'){startLasso(e,pt);return}
  if(tool==='pen'){startInk(e,pt);return}
  if(tool==='erase'){handleErase(pt);return}
  if(tool==='arrow'){startConn(pt);return}
  if(['action','decision','terminal','system','note','container'].includes(tool)){placeShape(tool,pt);return}
},{passive:false});

I('vp').addEventListener('pointermove',function(e){
  if(vpDrag||penActive||dragShape||cpDrag||connStart||lassoActive||dragMulti)e.preventDefault();
  var pt=canvasPoint(e);
  if(vpDrag&&!penActive){vpX=e.clientX-vpDx;vpY=e.clientY-vpDy;applyVP();return}
  if(penActive&&tool==='pen'){extendInk(e,pt);return}
  if(tool==='erase'&&e.buttons){handleErase(pt);return}
  if(dragMulti){moveDragMulti(pt);return}
  if(dragShape){moveDragShape(pt);return}
  if(cpDrag){moveCPDrag(pt);return}
  if(tool==='arrow'&&connStart){updateConnPreview(pt);return}
  if(lassoActive){updateLasso(e);return}
},{passive:false});

I('vp').addEventListener('pointerup',function(e){
  if(vpDrag){vpDrag=false;I('vp').style.cursor=tool==='pan'?'grab':'crosshair';return}
  if(penActive&&tool==='pen'){endInk();return}
  if(dragMulti){endDragMulti();return}
  if(dragShape){endDragShape();return}
  if(cpDrag){cpDrag=null;return}
  if(connStart){endConn(canvasPoint(e));connStart=null;return}
  if(lassoActive){endLasso(e);return}
});

I('vp').addEventListener('pointercancel',function(e){
  vpDrag=false;penActive=false;dragShape=null;cpDrag=null;connStart=null;lassoActive=false;dragMulti=false;
});

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// PINCH-TO-ZOOM (touch)
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
I('vp').addEventListener('touchstart',function(e){
  if(e.touches.length===2){
    e.preventDefault();isPinching=true;vpDrag=false;
    var t1=e.touches[0],t2=e.touches[1];
    pinchDist=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
    pinchScale=vpScale;
    var r=I('vp').getBoundingClientRect();
    pinchMid={x:(t1.clientX+t2.clientX)/2-r.left,y:(t1.clientY+t2.clientY)/2-r.top};
  }
},{passive:false});

I('vp').addEventListener('touchmove',function(e){
  if(isPinching&&e.touches.length===2){
    e.preventDefault();
    var t1=e.touches[0],t2=e.touches[1];
    var dist=Math.hypot(t2.clientX-t1.clientX,t2.clientY-t1.clientY);
    var fac=dist/pinchDist;
    var newScale=Math.min(4,Math.max(.15,pinchScale*fac));
    var sf=newScale/vpScale;
    vpX=pinchMid.x-(pinchMid.x-vpX)*sf;
    vpY=pinchMid.y-(pinchMid.y-vpY)*sf;
    vpScale=newScale;
    applyVP();
  }
},{passive:false});

I('vp').addEventListener('touchend',function(e){
  if(e.touches.length<2)isPinching=false;
},{passive:false});

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// INK (freehand pen)
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function startInk(e,pt){
  penActive=true;penPressure=e.pressure||1;
  curStroke={pts:[pt],color:curColor,width:strokeW*(0.5+penPressure*0.5),layer:curLayer};
  penPts=[pt];
}
function extendInk(e,pt){
  if(!penActive||!curStroke)return;
  penPressure=e.pressure||1;curStroke.pts.push(pt);penPts.push(pt);
  drawInkStroke();
}
function drawInkStroke(){
  var ctx=I('inkLayer').getContext('2d');
  if(penPts.length<2)return;
  var pts=penPts;
  ctx.save();ctx.strokeStyle=curStroke.color;ctx.lineWidth=curStroke.width*(0.5+penPressure*0.8);
  ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);
  for(var i=1;i<pts.length-1;i++){var mx=(pts[i].x+pts[i+1].x)/2,my=(pts[i].y+pts[i+1].y)/2;ctx.quadraticCurveTo(pts[i].x,pts[i].y,mx,my)}
  ctx.lineTo(pts[pts.length-1].x,pts[pts.length-1].y);ctx.stroke();ctx.restore();
}
function endInk(){
  penActive=false;
  if(curStroke&&curStroke.pts.length>1){
    inkStrokes.push(curStroke);undoStack.push({type:'ink',idx:inkStrokes.length-1});
    detectShapeGesture(curStroke);updateUndoPanel();
  }
  curStroke=null;penPts=[];
}
function redrawInk(){
  var ctx=I('inkLayer').getContext('2d');
  ctx.clearRect(0,0,I('inkLayer').width,I('inkLayer').height);
  inkStrokes.forEach(function(s){
    ctx.save();ctx.strokeStyle=s.color;ctx.lineWidth=s.width;
    ctx.lineCap='round';ctx.lineJoin='round';ctx.beginPath();
    var p=s.pts;ctx.moveTo(p[0].x,p[0].y);
    for(var i=1;i<p.length-1;i++){var mx=(p[i].x+p[i+1].x)/2,my=(p[i].y+p[i+1].y)/2;ctx.quadraticCurveTo(p[i].x,p[i].y,mx,my)}
    ctx.lineTo(p[p.length-1].x,p[p.length-1].y);ctx.stroke();ctx.restore();
  });
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// GESTURE в†’ SHAPE SNAPPING
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function detectShapeGesture(stroke){
  var pts=stroke.pts;if(pts.length<6)return;
  var xs=pts.map(function(p){return p.x}),ys=pts.map(function(p){return p.y});
  var minX=Math.min.apply(null,xs),maxX=Math.max.apply(null,xs);
  var minY=Math.min.apply(null,ys),maxY=Math.max.apply(null,ys);
  var w=maxX-minX,h=maxY-minY;
  if(w<25||h<20)return;
  var dist=Math.hypot(pts[pts.length-1].x-pts[0].x,pts[pts.length-1].y-pts[0].y);
  if(dist>(w*2+h*2)*0.25)return;
  var shapeType='action';
  if(Math.abs(w/h-1)<0.5)shapeType='terminal';
  inkStrokes.pop();redrawInk();
  var cx=minX+w/2,cy=minY+h/2;
  addShape(shapeType,snap(cx-80),snap(cy-30),160,60,'');
  toast('Shape snapped вЂ” tap to label вњ“');
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// SHAPES
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function addShape(type,x,y,w,h,label){
  var sc=SHAPE_COLORS[type]||SHAPE_COLORS.action;
  var s={id:uid(),type:type,x:x,y:y,w:w||170,h:h||58,label:label||'',
    fill:sc.fill,stroke:sc.stroke,textColor:sc.text,
    owner:'',system:'',desc:'',flagged:false,layer:curLayer,
    yesTo:'',noTo:'',notes:'',answered:false,collapsed:false,children:[]};
  shapes.push(s);
  undoStack.push({type:'addShape',shapeId:s.id});
  renderShapes();updateStats();updateUndoPanel();autoSave();
  return s;
}
function placeShape(type,pt){
  if(type==='note'){addNote(pt.x,pt.y);return}
  if(type==='container'){
    var s=addShape('container',snap(pt.x-140),snap(pt.y-90),280,180,'Sub-process');
    setTimeout(function(){promptLabel(s.id)},80);return;
  }
  var w=type==='terminal'?150:170,h=type==='decision'?65:58;
  var s=addShape(type,snap(pt.x-w/2),snap(pt.y-h/2),w,h,'');
  setTimeout(function(){promptLabel(s.id)},80);
}
function promptLabel(id){
  var s=shapes.find(function(x){return x.id===id});if(!s)return;
  var lbl=window.prompt('Label this step:',s.label);
  if(lbl!==null){s.label=str(lbl);renderShapes();autoSave()}
}

// Shape path
function shapePathD(s){
  var x=s.x,y=s.y,w=s.w,h=s.h,type=s.type;
  if(type==='terminal'){var r=h/2;return'M'+(x+r)+','+y+' L'+(x+w-r)+','+y+' A'+r+','+r+' 0 0,1 '+(x+w-r)+','+(y+h)+' L'+(x+r)+','+(y+h)+' A'+r+','+r+' 0 0,1 '+(x+r)+','+y+' Z'}
  if(type==='decision'){var cx=x+w/2,cy=y+h/2;return'M'+cx+','+y+' L'+(x+w)+','+cy+' L'+cx+','+(y+h)+' L'+x+','+cy+' Z'}
  if(type==='container')return'M'+(x+10)+','+y+' l'+(w-20)+',0 a10,10 0 0,1 10,10 l0,'+(h-20)+' a10,10 0 0,1 -10,10 l-'+(w-20)+',0 a10,10 0 0,1 -10,-10 l0,-'+(h-20)+' a10,10 0 0,1 10,-10 Z';
  return'M'+(x+6)+','+y+' l'+(w-12)+',0 a6,6 0 0,1 6,6 l0,'+(h-12)+' a6,6 0 0,1 -6,6 l-'+(w-12)+',0 a6,6 0 0,1 -6,-6 l0,-'+(h-12)+' a6,6 0 0,1 6,-6 Z';
}
function portPos(s,port){
  if(port==='top')return{x:s.x+s.w/2,y:s.y};
  if(port==='bottom')return{x:s.x+s.w/2,y:s.y+s.h};
  if(port==='left')return{x:s.x,y:s.y+s.h/2};
  return{x:s.x+s.w,y:s.y+s.h/2};
}

function renderShapes(){
  var sl=I('shapeLayer');
  var existing=sl.querySelectorAll('.shape,.conn-g');
  for(var i=0;i<existing.length;i++)existing[i].remove();
  // Containers first (behind)
  shapes.filter(function(s){return s.type==='container'&&!s.collapsed}).forEach(function(s){renderShape(s)});
  shapes.filter(function(s){return s.type!=='container'}).forEach(function(s){renderShape(s)});
  // Collapsed containers
  shapes.filter(function(s){return s.type==='container'&&s.collapsed}).forEach(function(s){renderShape(s)});
  renderConns();
  I('shapeLbl').textContent=shapes.length;
  checkGaps();updateMinimap();
}

function renderShape(s){
  var sl=I('shapeLayer');
  var isSel=(selShape&&selShape.id===s.id)||selMulti.some(function(m){return m.id===s.id});
  var g=document.createElementNS('http://www.w3.org/2000/svg','g');
  g.className.baseVal='shape'+(isSel?' sel-shape':'');
  g.dataset.id=s.id;
  g.addEventListener('click',function(e){e.stopPropagation();onShapeClick(s.id,e)});
  g.addEventListener('pointerdown',function(e){e.stopPropagation();onShapePointerDown(s.id,e)});

  // Collapsed container вЂ” render as small pill
  if(s.type==='container'&&s.collapsed){
    var pill=document.createElementNS('http://www.w3.org/2000/svg','rect');
    pill.setAttribute('x',s.x);pill.setAttribute('y',s.y);pill.setAttribute('width',s.w);pill.setAttribute('height',32);
    pill.setAttribute('rx','8');pill.setAttribute('fill',s.stroke);pill.setAttribute('opacity','.25');
    g.appendChild(pill);
    var tl=document.createElementNS('http://www.w3.org/2000/svg','text');
    tl.setAttribute('x',s.x+10);tl.setAttribute('y',s.y+20);
    tl.setAttribute('font-size','11');tl.setAttribute('font-weight','700');tl.setAttribute('fill',s.stroke);tl.setAttribute('font-family','Inter,sans-serif');
    tl.textContent='в–¶ '+(s.label||'Group')+' ('+s.children.length+')';
    g.appendChild(tl);sl.appendChild(g);return;
  }

  // Shape path
  var path=document.createElementNS('http://www.w3.org/2000/svg','path');
  path.className.baseVal='shape-bg';
  path.setAttribute('d',shapePathD(s));
  path.setAttribute('fill',s.fill);
  path.setAttribute('stroke',isSel?'#B85C52':s.stroke);
  path.setAttribute('stroke-width',isSel?'2.5':'1.5');
  if(s.layer==='risk')path.setAttribute('stroke-dasharray','5,3');
  if(s.type==='container')path.setAttribute('stroke-dasharray','8,4');
  g.appendChild(path);

  // Container header band
  if(s.type==='container'){
    var band=document.createElementNS('http://www.w3.org/2000/svg','rect');
    band.setAttribute('x',s.x);band.setAttribute('y',s.y);band.setAttribute('width',s.w);band.setAttribute('height',24);
    band.setAttribute('fill',s.stroke);band.setAttribute('opacity','.15');band.setAttribute('rx','10');
    g.appendChild(band);
    if(s.label){
      var ct=document.createElementNS('http://www.w3.org/2000/svg','text');
      ct.setAttribute('x',s.x+12);ct.setAttribute('y',s.y+16);
      ct.setAttribute('font-size','10');ct.setAttribute('font-weight','700');ct.setAttribute('fill',s.stroke);ct.setAttribute('font-family','Inter,sans-serif');
      ct.textContent='в–ј '+s.label.toUpperCase();g.appendChild(ct);
    }
    // Collapse button
    var cb=document.createElementNS('http://www.w3.org/2000/svg','text');
    cb.setAttribute('x',s.x+s.w-14);cb.setAttribute('y',s.y+16);
    cb.setAttribute('font-size','11');cb.setAttribute('fill',s.stroke);cb.setAttribute('font-family','Inter,sans-serif');
    cb.setAttribute('cursor','pointer');cb.textContent='в€’';
    cb.addEventListener('click',function(e){e.stopPropagation();collapseContainer(s.id)});
    g.appendChild(cb);
    sl.appendChild(g);return;
  }

  // Flag indicator
  if(s.flagged){
    var flag=document.createElementNS('http://www.w3.org/2000/svg','circle');
    flag.setAttribute('cx',s.x+s.w-8);flag.setAttribute('cy',s.y+8);flag.setAttribute('r','4');
    flag.setAttribute('fill','#F59E0B');g.appendChild(flag);
  }

  // Label
  var cx=s.x+s.w/2,cy=s.y+s.h/2;
  if(s.label){
    var words=s.label.split(' '),lines=[],line='';
    words.forEach(function(w){if((line+' '+w).trim().length>20&&line){lines.push(line.trim());line=w}else line=(line+' '+w).trim()});
    if(line)lines.push(line);
    var lineH=14,startY=cy-(lines.length-1)*lineH/2;
    lines.forEach(function(ln,i){
      var t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.className.baseVal='shape-label';
      t.setAttribute('x',cx);t.setAttribute('y',startY+i*lineH);
      t.setAttribute('text-anchor','middle');t.setAttribute('dominant-baseline','middle');
      t.setAttribute('font-size','12');t.setAttribute('fill',s.textColor);
      t.textContent=ln;g.appendChild(t);
    });
  }

  // Port dots (on select)
  if(isSel){
    ['top','bottom','left','right'].forEach(function(port){
      var pp=portPos(s,port);
      var c=document.createElementNS('http://www.w3.org/2000/svg','circle');
      c.setAttribute('cx',pp.x);c.setAttribute('cy',pp.y);c.setAttribute('r','5');
      c.setAttribute('fill','#fff');c.setAttribute('stroke','#C9847A');c.setAttribute('stroke-width','1.5');
      c.style.cursor='crosshair';
      c.addEventListener('pointerdown',function(ev){ev.stopPropagation();connStart={shapeId:s.id,port:port,x:pp.x,y:pp.y}});
      g.appendChild(c);
    });
    // Resize handle
    var rh=document.createElementNS('http://www.w3.org/2000/svg','rect');
    rh.setAttribute('x',s.x+s.w-8);rh.setAttribute('y',s.y+s.h-8);
    rh.setAttribute('width','8');rh.setAttribute('height','8');
    rh.setAttribute('fill','#C9847A');rh.setAttribute('rx','2');rh.style.cursor='se-resize';
    rh.addEventListener('pointerdown',function(ev){ev.stopPropagation();cpDrag={type:'resize',id:s.id}});
    g.appendChild(rh);
  }
  sl.appendChild(g);
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// CONNECTIONS
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function startConn(pt){
  var hit=hitTestShape(pt);
  if(hit){var pp=portPos(hit,'bottom');connStart={shapeId:hit.id,x:pp.x,y:pp.y};return}
  connStart=null;
}
function updateConnPreview(pt){
  if(!connStart)return;
  var prev=I('shapeLayer').querySelector('#connPreview');
  if(!prev){prev=document.createElementNS('http://www.w3.org/2000/svg','line');prev.id='connPreview';prev.setAttribute('stroke','#DEB8B3');prev.setAttribute('stroke-width','1.5');prev.setAttribute('stroke-dasharray','5,3');I('shapeLayer').appendChild(prev)}
  prev.setAttribute('x1',connStart.x);prev.setAttribute('y1',connStart.y);
  prev.setAttribute('x2',pt.x);prev.setAttribute('y2',pt.y);
}
function endConn(pt){
  var prev=I('shapeLayer').querySelector('#connPreview');if(prev)prev.remove();
  if(!connStart)return;
  var hit=hitTestShape(pt);
  if(hit&&hit.id!==connStart.shapeId&&hit.type!=='container'){
    var existing=conns.find(function(c){return c.from===connStart.shapeId&&c.to===hit.id});
    if(!existing){
      conns.push({id:uid(),from:connStart.shapeId,to:hit.id,label:'',color:'#C9847A',style:'solid',cpX:null,cpY:null,width:1.5});
      undoStack.push({type:'addConn',connId:conns[conns.length-1].id});
      renderShapes();toast('Connected');updateUndoPanel();autoSave();
    }
  }
  connStart=null;
}
function hitTestShape(pt){return shapes.find(function(s){return pt.x>=s.x-10&&pt.x<=s.x+s.w+10&&pt.y>=s.y-10&&pt.y<=s.y+s.h+10})||null}

function renderConns(){
  var sl=I('shapeLayer');
  var existing=sl.querySelectorAll('.conn-g');
  for(var i=0;i<existing.length;i++)existing[i].remove();
  conns.forEach(function(c){
    var src=shapes.find(function(s){return s.id===c.from});
    var tgt=shapes.find(function(s){return s.id===c.to});
    if(!src||!tgt)return;
    var p1=portPos(src,'bottom'),p2=portPos(tgt,'top');
    var useSide=Math.abs(src.y-tgt.y)<40;
    var fx=useSide?portPos(src,'right').x:p1.x,fy=useSide?portPos(src,'right').y:p1.y;
    var tx=useSide?portPos(tgt,'left').x:p2.x,ty=useSide?portPos(tgt,'left').y:p2.y;
    var mid={x:c.cpX!==null?c.cpX:(fx+tx)/2,y:c.cpY!==null?c.cpY:(fy+ty)/2};
    var col=c.color||'#C9847A';
    var dash=c.style==='dashed'?'8,4':c.style==='dotted'?'2,4':'none';
    var g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.className.baseVal='conn-g';
    var path=document.createElementNS('http://www.w3.org/2000/svg','path');
    path.className.baseVal='conn-path'+(selConn&&selConn.id===c.id?' sel-conn':'');
    path.setAttribute('d','M'+fx+','+fy+' Q'+mid.x+','+mid.y+' '+tx+','+ty);
    path.setAttribute('stroke',col);path.setAttribute('stroke-width',c.width||1.5);
    if(dash!=='none')path.setAttribute('stroke-dasharray',dash);
    path.setAttribute('marker-end','url(#arrEnd)');
    path.addEventListener('click',function(e){e.stopPropagation();onConnClick(c.id)});
    g.appendChild(path);
    // Midpoint control
    var cp=document.createElementNS('http://www.w3.org/2000/svg','circle');
    cp.setAttribute('cx',mid.x);cp.setAttribute('cy',mid.y);cp.setAttribute('r','4');
    cp.setAttribute('fill','#fff');cp.setAttribute('stroke',col);cp.setAttribute('stroke-width','1.5');
    cp.style.cursor='move';
    cp.addEventListener('pointerdown',function(ev){ev.stopPropagation();cpDrag={type:'conn',connId:c.id}});
    g.appendChild(cp);
    if(c.label){
      var t=document.createElementNS('http://www.w3.org/2000/svg','text');
      t.setAttribute('x',mid.x);t.setAttribute('y',mid.y-7);t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size','9');t.setAttribute('font-weight','700');t.setAttribute('fill',col);
      t.setAttribute('font-family','Inter,sans-serif');t.textContent=c.label;g.appendChild(t);
    }
    sl.appendChild(g);
  });
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// SELECT / DRAG / RESIZE
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function handleSelectDown(e,pt){
  var hit=hitTestShape(pt);
  if(hit){
    // If shift held, add to multi-select
    if(e.shiftKey){
      if(!selMulti.some(function(s){return s.id===hit.id})){selMulti.push(hit)}
      renderShapes();return;
    }
    selShape=hit;selConn=null;selMulti=[];
    dragShape=hit;dragOff={x:pt.x-hit.x,y:pt.y-hit.y};
    renderShapes();showShapeProps(hit);
  } else {
    // Deselect
    selShape=null;selConn=null;selMulti=[];
    renderShapes();buildSketchPanel();
  }
}
function onShapeClick(id,e){
  var s=shapes.find(function(x){return x.id===id});if(!s)return;
  if(tool==='erase'){deleteShape(id);return}
  // Expand collapsed container on click
  if(s.type==='container'&&s.collapsed){expandContainer(id);return}
  selShape=s;selConn=null;renderShapes();showShapeProps(s);
}
function onShapePointerDown(id,e){
  var s=shapes.find(function(x){return x.id===id});if(!s)return;
  selShape=s;
  // Multi-drag
  if(selMulti.length>0&&selMulti.some(function(m){return m.id===id})){
    dragMulti=true;
    var pt=canvasPoint(e);
    dragMultiOff=selMulti.map(function(m){return{id:m.id,dx:pt.x-m.x,dy:pt.y-m.y}});
    return;
  }
  dragShape=s;dragOff={x:canvasPoint(e).x-s.x,y:canvasPoint(e).y-s.y};
}
function moveDragShape(pt){
  if(!dragShape)return;
  dragShape.x=snap(pt.x-dragOff.x);dragShape.y=snap(pt.y-dragOff.y);renderShapes();
}
function endDragShape(){dragShape=null;autoSave()}
function moveDragMulti(pt){
  dragMultiOff.forEach(function(o){
    var s=shapes.find(function(x){return x.id===o.id});
    if(s){s.x=snap(pt.x-o.dx);s.y=snap(pt.y-o.dy)}
  });
  renderShapes();
}
function endDragMulti(){dragMulti=false;autoSave()}
function moveCPDrag(pt){
  if(cpDrag.type==='resize'){
    var s=shapes.find(function(x){return x.id===cpDrag.id});if(!s)return;
    s.w=Math.max(80,snap(pt.x-s.x));s.h=Math.max(40,snap(pt.y-s.y));renderShapes();
  }
  if(cpDrag.type==='conn'){
    var c=conns.find(function(x){return x.id===cpDrag.connId});
    if(c){c.cpX=pt.x;c.cpY=pt.y;renderConns()}
  }
}
function onConnClick(id){var c=conns.find(function(x){return x.id===id});if(!c)return;selConn=c;selShape=null;renderShapes();showConnProps(c)}

function deleteShape(id){
  shapes=shapes.filter(function(s){return s.id!==id});
  conns=conns.filter(function(c){return c.from!==id&&c.to!==id});
  if(selShape&&selShape.id===id){selShape=null;buildSketchPanel()}
  undoStack.push({type:'deleteShape',id:id});
  renderShapes();toast('Removed');updateUndoPanel();autoSave();
}
function deleteConn(id){conns=conns.filter(function(c){return c.id!==id});selConn=null;renderShapes();buildSketchPanel();autoSave()}

// Double-tap to edit label
var lastTap=0;
I('shapeLayer').addEventListener('click',function(e){
  var g=e.target.closest('.shape');if(!g)return;
  var now=Date.now();
  if(now-lastTap<400){var s=shapes.find(function(x){return x.id===g.dataset.id});if(s)promptLabel(s.id)}
  lastTap=now;
});

// Click empty canvas = deselect
I('vp').addEventListener('click',function(e){
  if(e.target===I('vp')||e.target===I('ci')||e.target===I('inkLayer')){
    selShape=null;selConn=null;selMulti=[];renderShapes();buildSketchPanel();
  }
});

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// LASSO SELECT (bulk)
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function startLasso(e,pt){
  lassoActive=true;lassoStart={x:e.clientX,y:e.clientY};
  lassoEl=document.createElement('div');lassoEl.className='lasso-rect';
  lassoEl.style.left=e.clientX+'px';lassoEl.style.top=e.clientY+'px';
  lassoEl.style.width='0';lassoEl.style.height='0';
  document.body.appendChild(lassoEl);
}
function updateLasso(e){
  if(!lassoActive||!lassoEl)return;
  var x=Math.min(e.clientX,lassoStart.x),y=Math.min(e.clientY,lassoStart.y);
  var w=Math.abs(e.clientX-lassoStart.x),h=Math.abs(e.clientY-lassoStart.y);
  lassoEl.style.left=x+'px';lassoEl.style.top=y+'px';lassoEl.style.width=w+'px';lassoEl.style.height=h+'px';
}
function endLasso(e){
  if(!lassoActive)return;lassoActive=false;
  if(!lassoEl){return}
  var rect=lassoEl.getBoundingClientRect();lassoEl.remove();lassoEl=null;
  // Convert screen rect to canvas coords
  var vpR=I('vp').getBoundingClientRect();
  var x1=(rect.left-vpR.left-vpX)/vpScale,y1=(rect.top-vpR.top-vpY)/vpScale;
  var x2=(rect.right-vpR.left-vpX)/vpScale,y2=(rect.bottom-vpR.top-vpY)/vpScale;
  selMulti=shapes.filter(function(s){
    return s.x+s.w>x1&&s.x<x2&&s.y+s.h>y1&&s.y<y2;
  });
  if(selMulti.length){toast(selMulti.length+' shapes selected');renderShapes()}
}
function clearLasso(){selMulti=[];if(lassoEl){lassoEl.remove();lassoEl=null}}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// COLLAPSIBLE GROUPS
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function collapseContainer(id){
  var c=shapes.find(function(s){return s.id===id});if(!c||c.type!=='container')return;
  // Find shapes inside bounds
  c.children=shapes.filter(function(s){return s.id!==id&&s.x>=c.x&&s.x+s.w<=c.x+c.w&&s.y>=c.y&&s.y+s.h<=c.y+c.h}).map(function(s){return s.id});
  // Hide children
  c.children.forEach(function(cid){
    var ch=shapes.find(function(s){return s.id===cid});if(ch)ch._hidden=true;
  });
  c.collapsed=true;c.h=32;
  renderShapes();toast('Group collapsed ('+c.children.length+' shapes)');autoSave();
}
function expandContainer(id){
  var c=shapes.find(function(s){return s.id===id});if(!c)return;
  c.children.forEach(function(cid){
    var ch=shapes.find(function(s){return s.id===cid});if(ch)delete ch._hidden;
  });
  c.collapsed=false;c.h=180;
  renderShapes();toast('Group expanded');autoSave();
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// ERASE
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function handleErase(pt){
  var rad=20,changed=false;
  inkStrokes=inkStrokes.filter(function(s){
    var hit=s.pts.some(function(p){return Math.hypot(p.x-pt.x,p.y-pt.y)<rad});
    if(hit)changed=true;return!hit;
  });
  if(changed)redrawInk();
}

// NOTES

function addNote(x,y){
  var id=uid();
  var div=document.createElement('div');div.className='sticky';
  div.style.left=snap(x)+'px';div.style.top=snap(y)+'px';div.id='note_'+id;
  div.innerHTML='<div class="sticky-head"><span class="sticky-title">Note</span><button class="sticky-del" onclick="removeNote(\''+id+'\')">вњ•</button></div><textarea class="sticky-body" placeholder="Write your note here..."></textarea>';
  makeDraggable(div);I('noteLayer').appendChild(div);
  notes.push({id:id,el:div});
  div.querySelector('textarea').focus();
}
function removeNote(id){var n=notes.find(function(x){return x.id===id});if(n){n.el.remove();notes=notes.filter(function(x){return x.id!==id})}}
function makeDraggable(el){
  var head=el.querySelector('.sticky-head');head.style.cursor='move';
  head.addEventListener('pointerdown',function(e){
    if(e.target.tagName==='BUTTON')return;
    var mx=e.clientX,my=e.clientY,dx=el.offsetLeft,dy=el.offsetTop;
    function onMove(ev){el.style.left=snap((dx+ev.clientX-mx)/vpScale)+'px';el.style.top=snap((dy+ev.clientY-my)/vpScale)+'px'}
    function onUp(){document.removeEventListener('pointermove',onMove);document.removeEventListener('pointerup',onUp)}
    document.addEventListener('pointermove',onMove);document.addEventListener('pointerup',onUp);
  });
}

// UNDO

function undoAction(){
  var last=undoStack.pop();if(!last)return;
  if(last.type==='ink'){inkStrokes.splice(last.idx,1);redrawInk()}
  if(last.type==='addShape'){shapes=shapes.filter(function(s){return s.id!==last.shapeId});renderShapes()}
  if(last.type==='addConn'){conns=conns.filter(function(c){return c.id!==last.connId});renderShapes()}
  toast('Undone');updateUndoPanel();
}
function clearCanvas(){
  if(!confirm('Clear the canvas? This cannot be undone.'))return;
  shapes=[];conns=[];notes.forEach(function(n){n.el.remove()});notes=[];

// AUTO-LAYOUT
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function autoLayout(){
  if(!shapes.length){toast('No shapes to layout');return}
  // Topological sort via connections
  var nonContainer=shapes.filter(function(s){return s.type!=='container'&&!s._hidden});
  var ids=nonContainer.map(function(s){return s.id});
  var inDeg={};ids.forEach(function(id){inDeg[id]=0});
  conns.forEach(function(c){if(inDeg[c.to]!==undefined)inDeg[c.to]++});
  var queue=ids.filter(function(id){return inDeg[id]===0});
  var sorted=[];
  while(queue.length){
    var n=queue.shift();sorted.push(n);
    conns.filter(function(c){return c.from===n}).forEach(function(c){
      if(inDeg[c.to]!==undefined){inDeg[c.to]--;if(inDeg[c.to]===0)queue.push(c.to)}
    });
  }
  // Add any remaining (disconnected shapes)
  ids.forEach(function(id){if(sorted.indexOf(id)===-1)sorted.push(id)});
  // Layout vertically centred
  var CX=300,y=40,GAP=90;
  sorted.forEach(function(id){
    var s=shapes.find(function(x){return x.id===id});if(!s)return;
    s.x=snap(CX-s.w/2);s.y=snap(y);y+=s.h+GAP;
  });
  // Reset connection control points
  conns.forEach(function(c){c.cpX=null;c.cpY=null});
  renderShapes();fitScreen();toast('Auto-layout applied');autoSave();
}

// SEARCH
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function toggleSearch(){
  var ov=I('searchOv');ov.classList.toggle('open');
  if(ov.classList.contains('open')){I('searchInp').value='';I('searchInp').focus();I('searchResults').innerHTML=''}
}
function doSearch(q){
  var res=I('searchResults');res.innerHTML='';
  if(!q.trim()){return}
  var lq=q.toLowerCase();
  var matches=shapes.filter(function(s){
    return(s.label&&s.label.toLowerCase().includes(lq))||(s.owner&&s.owner.toLowerCase().includes(lq))||(s.type&&s.type.toLowerCase().includes(lq))
  });
  matches.forEach(function(s,i){
    var d=document.createElement('div');d.className='search-item';
    d.innerHTML='<div class="search-item-num">'+(shapes.indexOf(s)+1)+'</div><div class="search-item-name">'+esc(s.label||'(unlabelled)')+'</div><span class="search-item-type">'+s.type+'</span>';
    d.onclick=function(){jumpToShape(s.id);I('searchOv').classList.remove('open')};
    res.appendChild(d);
  });
  if(!matches.length)res.innerHTML='<div style="padding:10px;font-size:11px;color:var(--text3);text-align:center">No matches</div>';
}
function jumpToShape(id){
  var s=shapes.find(function(x){return x.id===id});if(!s)return;
  var r=I('vp').getBoundingClientRect();
  vpX=r.width/2-(s.x+s.w/2)*vpScale;vpY=r.height/2-(s.y+s.h/2)*vpScale;
  applyVP();selShape=s;renderShapes();showShapeProps(s);
}
// Keyboard shortcut
document.addEventListener('keydown',function(e){
  if((e.metaKey||e.ctrlKey)&&e.key==='f'){e.preventDefault();toggleSearch()}
  if(e.key==='Escape'){document.querySelectorAll('.ov.open').forEach(function(o){o.classList.remove('open')});I('searchOv').classList.remove('open');I('undoPanel').classList.remove('open')}
  if((e.key==='Delete'||e.key==='Backspace')&&selShape){
    var tag=document.activeElement.tagName;
    if(!tag.match(/INPUT|TEXTAREA|SELECT/)&&!document.activeElement.isContentEditable){e.preventDefault();deleteShape(selShape.id)}
  }

});

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// MINIMAP
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function updateMinimap(){
  var cv=I('mmCanvas'),ctx=cv.getContext('2d');
  var cw=cv.width,ch=cv.height;ctx.clearRect(0,0,cw,ch);
  if(!shapes.length)return;
  // Calculate bounds
  var mx=Infinity,my=Infinity,mxX=0,mxY=0;
  shapes.forEach(function(s){mx=Math.min(mx,s.x);my=Math.min(my,s.y);mxX=Math.max(mxX,s.x+s.w);mxY=Math.max(mxY,s.y+s.h)});
  var tw=mxX-mx+80,th=mxY-my+80;
  var scale=Math.min(cw/tw,ch/th)*0.9;
  var ox=(cw-tw*scale)/2-mx*scale,oy=(ch-th*scale)/2-my*scale;
  // Draw shapes
  shapes.forEach(function(s){
    ctx.fillStyle=s.type==='container'?'rgba(222,184,191,0.3)':s.fill||'#F9F0EE';
    ctx.strokeStyle=s.stroke||'#C9847A';ctx.lineWidth=1;
    ctx.beginPath();ctx.rect(s.x*scale+ox,s.y*scale+oy,s.w*scale,s.h*scale);ctx.fill();ctx.stroke();
  });
  // Draw connections
  ctx.strokeStyle='#DEB8B3';ctx.lineWidth=0.5;
  conns.forEach(function(c){
    var src=shapes.find(function(s){return s.id===c.from});
    var tgt=shapes.find(function(s){return s.id===c.to});
    if(!src||!tgt)return;
    ctx.beginPath();ctx.moveTo((src.x+src.w/2)*scale+ox,(src.y+src.h)*scale+oy);
    ctx.lineTo((tgt.x+tgt.w/2)*scale+ox,tgt.y*scale+oy);ctx.stroke();
  });
  // Viewport rectangle
  var vpRect=I('vp').getBoundingClientRect();
  var vx=(-vpX/vpScale)*scale+ox,vy=(-vpY/vpScale)*scale+oy;
  var vw=(vpRect.width/vpScale)*scale,vh=(vpRect.height/vpScale)*scale;
  var mmVp=I('mmVp');
  mmVp.style.left=Math.max(0,vx)+'px';mmVp.style.top=Math.max(0,vy)+'px';
  mmVp.style.width=Math.min(cw,vw)+'px';mmVp.style.height=Math.min(ch,vh)+'px';
}
function minimapClick(e){
  var mm=I('minimap').getBoundingClientRect();
  var cv=I('mmCanvas');
  if(!shapes.length)return;
  var mx=Infinity,my=Infinity,mxX=0,mxY=0;
  shapes.forEach(function(s){mx=Math.min(mx,s.x);my=Math.min(my,s.y);mxX=Math.max(mxX,s.x+s.w);mxY=Math.max(mxY,s.y+s.h)});
  var tw=mxX-mx+80,th=mxY-my+80;
  var scale=Math.min(cv.width/tw,cv.height/th)*0.9;
  var ox=(cv.width-tw*scale)/2-mx*scale,oy=(cv.height-th*scale)/2-my*scale;
  var clickX=(e.clientX-mm.left),clickY=(e.clientY-mm.top);
  var canX=(clickX-ox)/scale,canY=(clickY-oy)/scale;
  var r=I('vp').getBoundingClientRect();
  vpX=r.width/2-canX*vpScale;vpY=r.height/2-canY*vpScale;
  applyVP();
}

// localStorage вЂ” AUTO-SAVE / LOAD
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function autoSave(){
  try{
    var data={
      title:I('docTitle').value,settings:settings,
      shapes:shapes.map(function(s){var o={};for(var k in s)if(k!=='el')o[k]=s[k];return o}),
      conns:conns,inkStrokes:inkStrokes
    };
    localStorage.setItem('flowSketchpad',JSON.stringify(data));
    I('saveStatus').textContent='Saved '+new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
  }catch(e){}
}
function loadSaved(){
  try{
    var raw=localStorage.getItem('flowSketchpad');if(!raw)return false;
    var data=JSON.parse(raw);
    if(data.title)I('docTitle').value=data.title;
    if(data.settings)settings=Object.assign(settings,data.settings);
    if(data.shapes){shapes=data.shapes;shapeCounter=shapes.length+1}

// GAP DETECTION
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function checkGaps(){
  var gaps=[];
  shapes.filter(function(s){return s.type!=='container'&&!s._hidden}).forEach(function(s){
    var hasIn=conns.some(function(c){return c.to===s.id});
    var hasOut=conns.some(function(c){return c.from===s.id});
    if(!hasIn&&s.type!=='terminal'&&shapes.length>1)gaps.push({sev:'warn',msg:'"'+(s.label||s.type)+'" no incoming'});
    if(!hasOut&&s.type!=='terminal'&&shapes.length>1)gaps.push({sev:'warn',msg:'"'+(s.label||s.type)+'" no outgoing'});
    if(s.type==='decision'){var outC=conns.filter(function(c){return c.from===s.id});if(outC.length<2)gaps.push({sev:'warn',msg:'Decision "'+(s.label||'')+'" needs YES/NO routes'})}
  });
  I('gapWarn').style.display=gaps.length?'flex':'none';
  return gaps;
}
function updateStats(){I('shapeLbl').textContent=shapes.length;checkGaps()}

// PROPERTIES PANEL

function showShapeProps(s){

function updateShapeProp(id,key,val){var s=shapes.find(function(x){return x.id===id});if(s){s[key]=val;renderShapes();autoSave()}}
function toggleFlag(id){var s=shapes.find(function(x){return x.id===id});if(s){s.flagged=!s.flagged;renderShapes();showShapeProps(s);autoSave()}}
function updateConn(id,key,val){var c=conns.find(function(x){return x.id===id});if(c){c[key]=val;renderShapes();showConnProps(c);autoSave()}}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// AI INTERVIEW
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function openAIInterview(){
  ivStep=0;ivAnswers={};I('rpTitle').textContent='AI Process Builder';
  renderInterviewStep();if(I('rpanel').classList.contains('collapsed'))togglePanel();
}
function renderInterviewStep(){
  var total=INTERVIEW_STEPS.length,s=INTERVIEW_STEPS[ivStep],pct=Math.round((ivStep/total)*100);
  var inputHtml='';
  if(s.type==='textarea')inputHtml='<textarea class="ai-inp" id="ivInp" placeholder="'+esc(s.ph)+'" style="min-height:80px">'+esc(ivAnswers[s.id]||'')+'</textarea>';
  else if(s.type==='select')inputHtml='<select class="sc-sel" id="ivInp"><option value="">вЂ” choose вЂ”</option>'+s.opts.map(function(o){return'<option'+(ivAnswers[s.id]===o?' selected':'')+'>'+o+'</option>'}).join('')+'</select>';
  else inputHtml='<input class="sc-inp" id="ivInp" placeholder="'+esc(s.ph)+'" value="'+esc(ivAnswers[s.id]||'')+'">';
  var rp=I('rpBody');
  rp.innerHTML='<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:9px;font-weight:700;color:var(--rose);text-transform:uppercase">Step '+(ivStep+1)+'/'+total+'</span><span style="font-size:9px;color:var(--text3)">'+pct+'%</span></div><div style="height:3px;background:var(--border);border-radius:2px"><div style="height:3px;background:var(--rose);border-radius:2px;width:'+pct+'%;transition:width .3s"></div></div></div>'+
    '<div class="ai-card" style="margin-bottom:8px"><div class="ai-q">'+esc(s.q)+'</div></div>'+
    inputHtml+
    '<div style="display:flex;gap:5px;margin-top:8px">'+
    (ivStep>0?'<button class="ai-btn ai-skip" onclick="ivBack()" style="flex:1">в†ђ Back</button>':'')+
    '<button class="ai-btn ai-save" onclick="ivNext()" style="flex:2">'+(ivStep===total-1?'вњ¦ Build в†’':'Next в†’')+'</button></div>';
  setTimeout(function(){var el=I('ivInp');if(el){el.focus();if(el.select)el.select()}},80);
}
function ivNext(){
  var s=INTERVIEW_STEPS[ivStep],el=I('ivInp');if(!el)return;
  var val=str(el.tagName==='SELECT'?(el.options[el.selectedIndex]?el.options[el.selectedIndex].value:''):el.value);
  if(!val&&(s.id==='name'||s.id==='steps')){toast('This field is required');if(el.focus)el.focus();return}
  ivAnswers[s.id]=val;
  if(ivStep===INTERVIEW_STEPS.length-1){buildFromInterview();return}
  ivStep++;renderInterviewStep();
}
function ivBack(){if(ivStep>0){ivStep--;renderInterviewStep()}}

function buildFromInterview(){
  I('docTitle').value=ivAnswers.name||'New Process';
  var stepLines=(ivAnswers.steps||'').split('\n').map(function(s){return str(s)}).filter(Boolean);
  var hasDec=ivAnswers.decision&&ivAnswers.decision.trim();
  var hasRisk=ivAnswers.risks&&ivAnswers.risks.trim();
  shapes=[];conns=[];notes.forEach(function(n){n.el.remove()});notes=[];inkStrokes=[];
  redrawInk();I('noteLayer').innerHTML='';undoStack=[];
  var CX=220,y=50,prevId=null;
  // Start
  var startS=addShapeSilent('terminal',snap(CX-75),snap(y),150,50,ivAnswers.trigger||'Start');prevId=startS.id;y+=130;
  // Steps
  var decInserted=false;
  stepLines.forEach(function(lbl,i){
    if(hasDec&&!decInserted&&i===Math.floor(stepLines.length/2)){
      var decS=addShapeSilent('decision',snap(CX-90),snap(y),180,65,ivAnswers.decision);
      addConnSilent(prevId,decS.id,'');prevId=decS.id;y+=150;decInserted=true;
    }
    var actionS=addShapeSilent('action',snap(CX-90),snap(y),180,58,lbl);
    actionS.owner=ivAnswers.owner||'';
    addConnSilent(prevId,actionS.id,'');prevId=actionS.id;y+=130;
  });
  // End
  var endS=addShapeSilent('terminal',snap(CX-75),snap(y),150,50,ivAnswers.outcome||'Complete');
  addConnSilent(prevId,endS.id,'');
  if(hasRisk){
    var rn=addShapeSilent('action',snap(CX+230),90,170,55,ivAnswers.risks);
    rn.layer='risk';rn.fill='#FDF0EE';rn.stroke='#B85C52';rn.flagged=true;rn.notes='Risk: '+ivAnswers.risks;
  }
  if(ivAnswers.owner)settings.procOwner=ivAnswers.owner;
  renderShapes();fitScreen();toast('Process built');
  setPhase('sketch');I('rpTitle').textContent='Sketch Assistant';buildSketchPanel();autoSave();
}
function addShapeSilent(type,x,y,w,h,label){
  var sc=SHAPE_COLORS[type]||SHAPE_COLORS.action;
  var s={id:uid(),type:type,x:x,y:y,w:w,h:h,label:label||'',fill:sc.fill,stroke:sc.stroke,textColor:sc.text,
    owner:'',system:'',desc:'',flagged:false,layer:'process',yesTo:'',noTo:'',notes:'',answered:true,collapsed:false,children:[]};
  shapes.push(s);return s;
}
function addConnSilent(fromId,toId,label){
  conns.push({id:uid(),from:fromId,to:toId,label:label||'',color:'#C9847A',style:'solid',cpX:null,cpY:null,width:1.5});
}

// PHASES

function setPhase(p){
  phase=p;
  ['sketch','review','export'].forEach(function(x){I('ph'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('on',x===p)});
  if(p==='review')buildReview();

  if(p==='sketch')buildSketchPanel();
  I('rpTitle').textContent=p==='sketch'?'Sketch Assistant':p==='review'?'Compliance Workshop':'Export Document';
  if(I('rpanel').classList.contains('collapsed'))togglePanel();
}
function buildSketchPanel(){
  var gaps=checkGaps();
  var gapHTML=gaps.slice(0,4).map(function(g){return'<div class="gap-item gap-warn"><span class="gap-ico">вљ </span><span class="gap-txt">'+esc(g.msg)+'</span></div>'}).join('');
  I('rpBody').innerHTML='<div class="ai-card" style="margin-bottom:6px"><div class="ai-q">'+
    (shapes.length?shapes.length+' shape'+(shapes.length>1?'s':'')+', '+conns.length+' connection'+(conns.length>1?'s':'')+'.<br>Double-tap shapes to edit. Use вњ¦ AI Build for guided creation.':'Tap вњ¦ AI Build to generate a process, or place shapes from the toolbar.')+
    '</div></div>'+

    '<button class="mbtn mbtn-p" style="width:100%" onclick="openAIInterview()">вњ¦ AI Build</button>'+
    '<button class="mbtn mbtn-s" style="width:100%" onclick="autoLayout()">Auto-layout</button>'+
    '<button class="mbtn mbtn-s" style="width:100%" onclick="setPhase(\'review\')">в†’ Review</button></div>';
}

// REVIEW вЂ” 4-stage compliance workshop
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function buildReview(){
  reviewSteps=shapes.filter(function(s){return s.type!=='container'&&!s._hidden}).map(function(s,i){return Object.assign({},s,{stepNo:i+1})});
  wsStage=0;wsStepIdx=0;wsOverrides={};renderWorkshopStage();
}
function renderWorkshopStage(){
  if(!reviewSteps.length){I('rpBody').innerHTML='<div style="color:var(--text3);font-size:11px;padding:8px">No shapes on canvas.</div>';return}
  var progHTML='<div style="display:flex;gap:2px;margin-bottom:12px">'+WS_STAGES.map(function(lbl,i){
    var done=i<wsStage,active=i===wsStage;
    var bg=done?'var(--sage)':active?'var(--rose)':'var(--border)';
    var tc=done||active?'#fff':'var(--text3)';
    return'<div style="flex:1;padding:3px 2px;background:'+bg+';border-radius:3px;text-align:center;font-size:8px;font-weight:700;color:'+tc+'">'+(done?'вњ“ ':active?'в†’ ':'')+lbl+'</div>';
  }).join('')+'</div>';
  var body='';
  if(wsStage===0)body=wsStage0HTML();
  else if(wsStage===1)body=wsStage1HTML();
  else if(wsStage===2)body=wsStage2HTML();
  else body=wsStage3HTML();
  I('rpBody').innerHTML=progHTML+body;
}
function wsStage0HTML(){
  var ownOpts=['HRSS','Manager','HR Director','Head of HR','Payroll','IT','Finance','Zellis'].map(function(o){return'<option'+(settings.procOwner===o?' selected':'')+'>'+o+'</option>'}).join('');
  return'<div class="ai-card" style="margin-bottom:8px"><div class="ai-q">Confirm process details before checking each step.</div></div>'+
    '<div class="sc-field"><label class="sc-lbl">Process name</label><input class="sc-inp" id="ws_title" value="'+esc(I('docTitle').value)+'"></div>'+
    '<div class="sc-field"><label class="sc-lbl">Process ID</label><input class="sc-inp" id="ws_procid" value="'+esc(settings.procId)+'"></div>'+
    '<div class="sc-field"><label class="sc-lbl">Owner</label><select class="sc-sel" id="ws_owner"><option value="">вЂ”</option>'+ownOpts+'</select></div>'+
    '<div class="sc-field"><label class="sc-lbl">Stage</label><select class="sc-sel" id="ws_stage"><option value="">вЂ”</option><option'+(settings.procStage==='As-Is'?' selected':'')+'>As-Is</option><option'+(settings.procStage==='Interim'?' selected':'')+'>Interim</option><option'+(settings.procStage==='To-Be'?' selected':'')+'>To-Be</option></select></div>'+
    '<div style="font-size:10px;color:var(--text3);padding:5px 0">'+reviewSteps.length+' steps В· '+conns.length+' connections</div>'+
    '<button class="mbtn mbtn-p" style="width:100%;margin-top:8px" onclick="wsStage0Next()">Check Steps в†’</button>';
}
function wsStage0Next(){
  var t=I('ws_title');if(t&&t.value)I('docTitle').value=t.value;
  var pi=I('ws_procid');if(pi)settings.procId=str(pi.value);
  var ow=I('ws_owner');if(ow)settings.procOwner=ow.value;
  var st=I('ws_stage');if(st)settings.procStage=st.value;
  wsStage=1;wsStepIdx=0;renderWorkshopStage();
}
function wsStage1HTML(){
  var s=reviewSteps[wsStepIdx];if(!s)return'';
  var total=reviewSteps.length;
  var SCOLS={action:'#C9847A',decision:'#B85C52',terminal:'#8FA89A',system:'#7A6068'};
  var col=SCOLS[s.type]||'#B09A95';
  var checks=[
    {key:'label',lbl:'Has label',pass:!!(s.label&&s.label.trim())},
    {key:'owner',lbl:'Owner assigned',pass:!!(s.owner&&s.owner.trim())},
    {key:'desc',lbl:'Description provided',pass:!!(s.desc&&s.desc.trim())},
    {key:'conn',lbl:'Connected',pass:conns.some(function(c){return c.from===s.id||c.to===s.id})||s.type==='terminal'},
  ];
  if(s.type==='decision')checks.push({key:'routes',lbl:'YES/NO routes',pass:s.yesTo||conns.filter(function(c){return c.from===s.id}).length>=2});
  var checksHTML=checks.map(function(c){
    var pass=c.pass||wsOverrides[s.id+'_'+c.key];
    return'<div style="display:flex;align-items:center;gap:5px;padding:4px 6px;border-radius:4px;background:'+(pass?'var(--glt)':'var(--rlt)')+'"><div style="width:14px;height:14px;border-radius:50%;background:'+(pass?'var(--sage)':'#D4A09A')+';display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:8px;font-weight:700;color:#fff">'+(pass?'вњ“':'!')+'</span></div><span style="font-size:10px;font-weight:500;color:var(--text);flex:1">'+c.lbl+'</span>'+
    (pass?'':'<button style="font-size:8px;padding:2px 5px;border:1px solid var(--border);border-radius:3px;background:#fff;cursor:pointer;color:var(--text3);font-family:inherit" onclick="wsOverrides[\''+s.id+'_'+c.key+'\']=true;renderWorkshopStage()">OK</button>')+'</div>';
  }).join('');
  var ownerOpts=['Employee','Manager','HRSS','Head of HR','Payroll','IT','Finance','Zellis','All'].map(function(o){return'<option'+(s.owner===o?' selected':'')+'>'+o+'</option>'}).join('');
  return'<div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:9px;font-weight:700;color:var(--rose)">Step '+(wsStepIdx+1)+'/'+total+'</span></div>'+
    '<div style="display:flex;align-items:center;gap:6px;padding:7px 9px;background:'+col+'18;border:1px solid '+col+'44;border-radius:6px;margin-bottom:8px"><div style="width:20px;height:20px;border-radius:5px;background:'+col+';color:#fff;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center">'+(wsStepIdx+1)+'</div><div><div style="font-size:11px;font-weight:700;color:var(--text)">'+(s.label||'(unlabelled)')+'</div><div style="font-size:9px;color:var(--text3)">'+s.type+'</div></div></div>'+
    '<div style="display:flex;flex-direction:column;gap:3px;margin-bottom:8px">'+checksHTML+'</div>'+
    '<div class="sc-field"><label class="sc-lbl">Label</label><input class="sc-inp" id="ws1_label" value="'+esc(s.label||'')+'"></div>'+
    '<div class="sc-field"><label class="sc-lbl">Owner</label><select class="sc-sel" id="ws1_owner"><option value="">вЂ”</option>'+ownerOpts+'</select></div>'+
    '<div class="sc-field"><label class="sc-lbl">Description</label><textarea class="sc-inp" id="ws1_desc" style="min-height:40px;resize:vertical">'+esc(s.desc||s.notes||'')+'</textarea></div>'+
    (s.type==='decision'?'<div class="sc-field"><label class="sc-lbl">YES в†’</label><input class="sc-inp" id="ws1_yes" value="'+esc(s.yesTo||'')+'"></div><div class="sc-field"><label class="sc-lbl">NO в†’</label><input class="sc-inp" id="ws1_no" value="'+esc(s.noTo||'')+'"></div>':'')+
    '<div style="display:flex;gap:4px;margin-top:8px">'+
    (wsStepIdx>0?'<button class="mbtn mbtn-s" style="flex:1" onclick="wsStepNav(-1)">в†ђ Prev</button>':'')+
    '<button class="mbtn mbtn-p" style="flex:2" onclick="wsStepNav(1)">'+(wsStepIdx===total-1?'Checklist в†’':'Next в†’')+'</button></div>';
}
function wsStepNav(dir){
  var s=reviewSteps[wsStepIdx];
  if(s){
    var sh=shapes.find(function(x){return x.id===s.id});
    var lEl=I('ws1_label'),oEl=I('ws1_owner'),dEl=I('ws1_desc'),yEl=I('ws1_yes'),nEl=I('ws1_no');
    if(lEl){s.label=str(lEl.value);if(sh)sh.label=s.label}
    if(oEl){s.owner=oEl.value;if(sh)sh.owner=s.owner}
    if(dEl){s.desc=str(dEl.value);if(sh){sh.desc=s.desc;sh.notes=s.desc}}
    if(yEl){s.yesTo=str(yEl.value);if(sh)sh.yesTo=s.yesTo}
    if(nEl){s.noTo=str(nEl.value);if(sh)sh.noTo=s.noTo}
    renderShapes();
  }
  if(dir===1&&wsStepIdx<reviewSteps.length-1){wsStepIdx++;renderWorkshopStage()}
  else if(dir===1){wsStage=2;renderWorkshopStage()}
  else if(dir===-1&&wsStepIdx>0){wsStepIdx--;renderWorkshopStage()}
}
function wsStage2HTML(){
  var checks=buildComplianceChecks();
  var passed=checks.filter(function(c){return c.pass||wsOverrides['g_'+c.key]}).length;
  var total=checks.length,pct=Math.round((passed/total)*100);

    return'<div style="padding:5px 8px;border-radius:5px;background:'+(pass?'#F0F5F2':'#FDF0EE')+';border:1px solid '+(pass?'#BDD9CF':'#DEB8B3')+'"><div style="display:flex;align-items:center;gap:5px"><div style="width:16px;height:16px;border-radius:50%;background:'+(pass?'var(--sage)':'#D4A09A')+';display:flex;align-items:center;justify-content:center;flex-shrink:0"><span style="font-size:8px;font-weight:700;color:#fff">'+(pass?'вњ“':'!')+'</span></div><div style="flex:1"><div style="font-size:10px;font-weight:600;color:var(--text)">'+c.lbl+'</div>'+(c.detail?'<div style="font-size:9px;color:var(--text3)">'+esc(c.detail)+'</div>':'')+'</div>'+
    (pass?'':'<button style="font-size:8px;padding:2px 5px;border:1px solid var(--border);border-radius:3px;background:#fff;cursor:pointer;color:var(--text3);font-family:inherit" onclick="wsOverrides[\'g_'+c.key+'\']=true;renderWorkshopStage()">OK</button>')+'</div></div>';
  }).join('');
  return'<div style="text-align:center;padding:8px 0 10px"><div style="font-size:24px;font-weight:800;color:'+(pct===100?'var(--sage)':'var(--rose)')+'">'+pct+'%</div><div style="font-size:10px;color:var(--text2)">'+passed+'/'+total+' passed</div></div>'+
    '<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px">'+checksHTML+'</div>'+
    '<div style="display:flex;gap:4px"><button class="mbtn mbtn-s" style="flex:1" onclick="wsStage=1;wsStepIdx=reviewSteps.length-1;renderWorkshopStage()">в†ђ Back</button><button class="mbtn mbtn-p" style="flex:2" onclick="wsStage=3;renderWorkshopStage()">Sign-off в†’</button></div>';
}
function buildComplianceChecks(){
  var steps=reviewSteps;
  var unlabelled=steps.filter(function(s){return!s.label||!s.label.trim()});
  var noOwner=steps.filter(function(s){return!s.owner&&s.type!=='terminal'});
  var noDesc=steps.filter(function(s){return!s.desc&&!s.notes&&s.type!=='terminal'});
  var decisions=steps.filter(function(s){return s.type==='decision'});
  var unrouted=decisions.filter(function(s){return!s.yesTo&&conns.filter(function(c){return c.from===s.id}).length<2});
  return[
    {key:'hasSteps',lbl:'Has at least one step',pass:steps.length>0,detail:steps.length+' step(s)'},
    {key:'labelled',lbl:'All steps labelled',pass:unlabelled.length===0,detail:unlabelled.length?unlabelled.length+' missing':undefined},
    {key:'owned',lbl:'All steps have owner',pass:noOwner.length===0,detail:noOwner.length?noOwner.length+' missing':undefined},
    {key:'described',lbl:'All steps described',pass:noDesc.length===0,detail:noDesc.length?noDesc.length+' missing':undefined},
    {key:'decisions',lbl:'Decision routes defined',pass:unrouted.length===0,detail:unrouted.length?unrouted.length+' incomplete':undefined},
    {key:'title',lbl:'Process has a name',pass:!!(I('docTitle').value&&I('docTitle').value!=='Untitled Process')},
    {key:'owner',lbl:'Process has owner',pass:!!(settings.procOwner&&settings.procOwner.trim())},
    {key:'stage',lbl:'Stage set (As-Is/To-Be)',pass:!!(settings.procStage&&settings.procStage.trim())},
  ];
}
function wsStage3HTML(){

  var total=checks.length,pct=Math.round((passed/total)*100),allGood=passed===total;

}

function doExport(){
